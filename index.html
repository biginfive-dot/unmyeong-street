<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>어반 로어: 운명의 거리 — 프로토타입 v0.8</title>
<style>
:root { color-scheme: light; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#d9d4cc; font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; display:flex; justify-content:center; padding:8px; }
#app { width:100%; max-width:960px; background:#2b2b30; color:#e8e4da; border-radius:14px; position:relative; overflow:hidden; box-shadow:0 10px 50px rgba(0,0,0,.4); }
#topZone { display:flex; gap:8px; padding:8px; background:linear-gradient(180deg,#34343c,#26262c); align-items:flex-start; }
#machineWrap { flex:1.55; min-width:0; }
#mTop { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.statpill { background:#1d1d24; border:1px solid #3c3c46; border-radius:14px; padding:2px 9px; font-size:12px; display:flex; align-items:center; gap:3px; }
.statpill b{ color:#ffd36b; font-size:13px; }
#stageBadge { margin-left:auto; background:#15151b; border:2px solid #5b6b78; color:#bfe3ef; border-radius:10px; padding:3px 11px; font-weight:bold; font-size:13px; }
#machine { background:#15161d; border:3px solid #3a7d8c; border-radius:12px; padding:8px; box-shadow:inset 0 0 24px #0a3a44aa; }
#board { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; }
.cell { aspect-ratio:1; background:#23222c; border:2px solid #34333f; border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:21px; position:relative; transition:transform .15s, box-shadow .2s, opacity .2s, border-color .2s; }
.cell .nm { font-size:8px; color:#9b93ad; line-height:1; margin-top:1px; }
.cell.active { border-color:var(--c,#7c6bb0); box-shadow:0 0 7px var(--c,#7c6bb0); }
.cell.misfire { opacity:.26; filter:grayscale(.85); }
.cell.pattern { border-color:#ffd36b !important; box-shadow:0 0 11px #ffd36bcc; }
.cell.pop { transform:scale(1.16); }
.cell.curse { border-color:#5a1f1f; background:#241313; }
.cell.banned { opacity:.25; border-color:#5a1f1f; }
#mHint { font-size:10.5px; color:#8d86a0; margin-top:5px; text-align:center; min-height:13px; }
#deckPanel { flex:.85; min-width:120px; background:#1d1d24; border:1px solid #3a3a44; border-radius:10px; padding:7px; }
#deckPanel h4 { font-style:italic; color:#cfc8de; font-size:13px; margin-bottom:5px; letter-spacing:1px; }
#deckList { display:flex; flex-wrap:wrap; gap:4px; }
.dchip { background:#26242f; border:1px solid #3a3947; border-radius:7px; padding:3px 5px; font-size:14px; display:flex; align-items:center; gap:1px; }
.dchip small{ font-size:10px; color:#ffd36b; }
#sideIcons { display:flex; flex-direction:column; gap:6px; }
.sicon { width:34px; height:34px; border:1px solid #4a4a55; border-radius:9px; background:#222229; font-size:17px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.sicon:active{ background:#33333d; }
#topCtrl { position:absolute; top:10px; right:10px; display:flex; gap:6px; z-index:6; }
#topCtrl button { width:32px; height:30px; border:1px solid #555; border-radius:8px; background:#1c1c22cc; color:#e8e4da; font-size:14px; cursor:pointer; }
#stage { position:relative; height:230px; background:radial-gradient(120% 80% at 50% 120%, #3a3a44 0%, #25252b 60%, #1a1a1f 100%); overflow:hidden; border-top:1px solid #000; }
#stage .stairs { position:absolute; left:50%; top:8px; transform:translateX(-50%); width:46%; height:80%; background:repeating-linear-gradient(#2f2f37 0 10px,#262630 10px 20px); clip-path:polygon(28% 0,72% 0,100% 100%,0 100%); opacity:.55; }
#player { position:absolute; left:5%; bottom:14px; width:120px; text-align:center; }
#player .sprite { font-size:62px; line-height:1; filter:drop-shadow(0 6px 6px #0008); }
#enemies { position:absolute; right:3%; bottom:14px; display:flex; gap:14px; align-items:flex-end; }
.enemy { width:96px; text-align:center; position:relative; transition:opacity .3s, transform .3s; }
.enemy .sprite { font-size:50px; line-height:1; filter:drop-shadow(0 6px 6px #0008); }
.enemy.dead { opacity:0; transform:translateY(10px) scale(.6); }
.enemy.target .sprite { animation:bob 1.2s ease-in-out infinite; }
.enemy .tmark { position:absolute; top:-16px; left:50%; transform:translateX(-50%); color:#ffd36b; font-size:14px; }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
.unitName { font-size:11px; color:#d8d2e2; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.hpbar { height:13px; background:#0c0b10; border-radius:7px; overflow:hidden; position:relative; border:1px solid #000; }
.hpfill { height:100%; background:linear-gradient(90deg,#c0392b,#e05545); transition:width .35s; }
.hpfill.pl { background:linear-gradient(90deg,#1e8e54,#2ecc71); }
.hptext { position:absolute; inset:0; text-align:center; font-size:9.5px; line-height:13px; color:#fff; text-shadow:0 1px 1px #000; }
.utags { font-size:9px; color:#c9a7ef; margin-top:2px; min-height:11px; }
.lvtag { display:inline-block; background:#111; border:1px solid #4a4a55; border-radius:6px; font-size:10px; padding:0 5px; margin-top:3px; color:#ffd36b; }
.shake { animation:shk .35s; }
@keyframes shk { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
.floatdmg { position:absolute; font-weight:bold; font-size:18px; pointer-events:none; animation:fl .9s forwards; z-index:7; text-shadow:0 2px 3px #000; }
@keyframes fl { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-40px)} }
#fateRow { display:flex; align-items:center; gap:8px; padding:6px 10px 0; }
#gaugeWrap { flex:1; background:#0e0c12; height:16px; border-radius:8px; overflow:hidden; position:relative; border:1px solid #000; }
#gaugeFill { height:100%; width:0%; background:linear-gradient(90deg,#7ea84a,#b6e063); transition:width .3s; }
#gaugeText { position:absolute; inset:0; font-size:10px; text-align:center; line-height:16px; color:#fff; text-shadow:0 1px 2px #000; }
#fateBtn { background:#3c3550; border:1px solid #6b5fa0; color:#e8e4da; border-radius:9px; padding:6px 10px; font-size:12px; cursor:pointer; white-space:nowrap; }
#fateBtn:disabled{ opacity:.4; cursor:default; }
#actions { display:flex; gap:8px; padding:7px 10px 4px; }
#spinBtn { flex:1; background:linear-gradient(180deg,#8a2f3c,#6e2430); color:#fff; border:none; border-radius:11px; padding:13px 0; font-size:17px; font-weight:bold; cursor:pointer; }
#spinBtn:disabled{ opacity:.5; cursor:default; }
.subBtn { background:#241f2e; color:#cfc8de; border:1px solid #3a3347; border-radius:11px; padding:0 14px; font-size:13px; cursor:pointer; }
#log { margin:3px 10px 10px; font-size:11.5px; line-height:1.5; color:#bdb5cc; min-height:60px; max-height:60px; overflow:hidden; background:#0000002e; border-radius:8px; padding:5px 8px; }
#log .hl{color:#ffd36b}#log .dmg{color:#ff8a8a}#log .good{color:#9fe08a}
small.ver{ display:block; text-align:center; color:#5b5568; font-size:10px; padding-bottom:8px; }
#ovl { position:absolute; inset:0; background:rgba(8,7,12,.92); display:none; align-items:center; justify-content:center; padding:16px; z-index:20; }
#ovl.show{ display:flex; }
#ovlBox { background:#1f1a28; border:1px solid #4a4060; border-radius:14px; padding:16px; width:100%; max-width:560px; max-height:94%; overflow-y:auto; }
#ovlBox h2{ font-size:17px; margin-bottom:4px; color:#fff; }
#ovlBox .sub2{ font-size:12px; color:#a89dc4; margin-bottom:12px; }
.opt { background:#27212f; border:1px solid #3a3347; border-radius:10px; padding:10px; margin-bottom:8px; cursor:pointer; display:flex; gap:10px; align-items:center; }
.opt:hover{ border-color:#7c6bb0; }
.opt .em{ font-size:26px; } .opt .tt{ font-size:14px; font-weight:bold; } .opt .dd{ font-size:11.5px; color:#a89dc4; line-height:1.4; }
.opt .pr{ margin-left:auto; font-size:13px; color:#ffd36b; white-space:nowrap; }
.rowbtns{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
.rowbtns button{ flex:1; background:#241f2e; border:1px solid #3a3347; color:#e8e4da; border-radius:10px; padding:10px; font-size:13px; cursor:pointer; min-width:90px; }
.rowbtns button.primary{ background:#6e2430; border-color:#8a2f3c; font-weight:bold; }
.catdot{ display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:4px; }
.cell.spinning { animation:reelBlur .12s linear infinite; }
@keyframes reelBlur { 0%{transform:translateY(-4px)} 50%{transform:translateY(4px);filter:blur(.4px)} 100%{transform:translateY(-4px)} }
.cell.settle { animation:settlePop .22s ease; z-index:2; }
@keyframes settlePop { 0%{transform:scale(1.28);box-shadow:0 0 12px #ffd36b} 60%{transform:scale(.94)} 100%{transform:scale(1)} }
#machine.flash { animation:mflash .55s; }
@keyframes mflash { 0%,100%{box-shadow:inset 0 0 24px #0a3a44aa} 45%{box-shadow:inset 0 0 24px #0a3a44aa,0 0 26px #ffd36b} }
#machine.bigflash { animation:bigflash .8s; }
@keyframes bigflash { 0%,100%{box-shadow:inset 0 0 24px #0a3a44aa} 30%,60%{box-shadow:inset 0 0 30px #ffd36b,0 0 40px #ffd36b} }
.proj { position:absolute; pointer-events:none; z-index:8; font-size:22px; line-height:1; filter:drop-shadow(0 2px 3px #000); will-change:left,bottom,transform; }
.impact { position:absolute; pointer-events:none; z-index:9; font-size:24px; line-height:1; animation:imp .45s forwards; }
@keyframes imp { 0%{opacity:1;transform:scale(.4) rotate(0)} 100%{opacity:0;transform:scale(2.2) rotate(40deg)} }
.aura { position:absolute; pointer-events:none; z-index:8; font-size:22px; line-height:1; filter:drop-shadow(0 2px 3px #000); animation:auraRise .75s forwards; }
@keyframes auraRise { 0%{opacity:0;transform:translateY(0) scale(.7)} 22%{opacity:1} 100%{opacity:0;transform:translateY(-50px) scale(1.2)} }
.enemy.hit .sprite { animation:hitFlash .3s; }
@keyframes hitFlash { 0%,100%{filter:drop-shadow(0 6px 6px #0008)} 50%{filter:drop-shadow(0 0 12px #ff6a6a) brightness(1.7)} }
#player.cast .sprite { animation:cast .3s; }
@keyframes cast { 0%,100%{transform:translateX(0)} 40%{transform:translateX(10px) scale(1.06)} }
#player.glow .sprite { animation:pglow .6s; }
@keyframes pglow { 0%,100%{filter:drop-shadow(0 6px 6px #0008)} 50%{filter:drop-shadow(0 0 14px #6fe0a0) brightness(1.3)} }
@media(max-width:680px){ #player .sprite{font-size:46px} .enemy .sprite{font-size:38px} #stage{height:185px} #deckPanel{flex:.7} }
/* === 모바일 세로 재배치 (스마트폰) === */
@media(max-width:600px){
  body{ padding:4px; }
  #topCtrl{ top:6px; right:6px; gap:4px; }
  #topCtrl button{ width:30px; height:28px; font-size:13px; }
  #topZone{ flex-direction:column; gap:6px; padding:6px; }
  #machineWrap{ flex:none; width:100%; }
  #mTop{ flex-wrap:wrap; gap:5px; padding-right:70px; }
  #mTop .statpill{ font-size:11px; padding:2px 7px; }
  #stageBadge{ margin-left:auto; font-size:12px; padding:3px 9px; }
  #machine{ padding:6px; }
  #board{ gap:4px; }
  .cell{ font-size:20px; }
  .cell .nm{ font-size:8px; }
  #deckPanel{ flex:none; width:100%; min-width:0; padding:6px 8px; }
  #deckPanel h4{ display:inline-block; margin:0 8px 0 0; vertical-align:middle; }
  #deckList{ display:inline-flex; vertical-align:middle; }
  #sideIcons{ flex-direction:row; width:100%; justify-content:flex-start; gap:8px; margin-top:2px; }
  .sicon{ width:42px; height:34px; font-size:18px; }
  #stage{ height:172px; }
  #player{ left:3%; width:30%; bottom:10px; }
  #player .sprite{ font-size:42px; }
  #enemies{ right:2%; bottom:10px; gap:6px; max-width:64%; }
  .enemy{ width:auto; min-width:54px; max-width:88px; }
  .enemy .sprite{ font-size:34px; }
  .unitName{ font-size:9px; }
  .hpbar{ height:12px; }
  .hptext{ font-size:9px; line-height:12px; }
  #fateRow,#actions{ padding-left:8px; padding-right:8px; }
  #spinBtn{ font-size:16px; padding:12px 0; }
  #fateBtn{ font-size:11px; padding:6px 8px; }
  .subBtn{ padding:0 10px; font-size:12px; }
  #ovlBox{ padding:12px; }
  #ovlBox h2{ font-size:16px; }
  .opt .em{ font-size:22px; }
  .rowbtns button{ min-width:0; padding:9px 6px; font-size:12px; }
}
</style>
</head>
<body>
<div id="app">
  <div id="topCtrl"><button id="skipBtn" title="빠르게">⏩</button><button id="menuBtn" title="메뉴">☰</button></div>
  <div id="topZone">
    <div id="machineWrap">
      <div id="mTop">
        <span class="statpill">🗡️ <b id="stAtk">0</b></span>
        <span class="statpill">🛡️ <b id="stDef">0</b></span>
        <span class="statpill">☠️ <b id="stPsn">0</b></span>
        <span id="stageBadge">STAGE 1 / 20</span>
      </div>
      <div id="machine"><div id="board"></div></div>
      <div id="mHint">다음에 드는 칸을 노려 같은 계열을 모으자 — 붙으면 발동!</div>
    </div>
    <div id="deckPanel"><h4>Deck</h4><div id="deckList"></div></div>
    <div id="sideIcons">
      <div class="sicon" id="icHelp" title="규칙">📖</div>
      <div class="sicon" id="icDeck" title="덱">🎒</div>
      <div class="sicon" id="icChar" title="캐릭터">🧙</div>
    </div>
  </div>
  <div id="stage">
    <div class="stairs"></div>
    <div id="player">
      <div class="sprite">🧙</div>
      <div class="unitName" id="pName">조사반</div>
      <div class="hpbar"><div class="hpfill pl" id="pHp"></div><div class="hptext" id="pHpT"></div></div>
      <div><span class="lvtag" id="pLv">Lv 1</span> <span id="pBlock" style="font-size:10px;color:#7fd3ff"></span></div>
    </div>
    <div id="enemies"></div>
  </div>
  <div id="fateRow">
    <div id="gaugeWrap"><div id="gaugeFill"></div><div id="gaugeText">운명 게이지 0 / 22</div></div>
    <button id="fateBtn">🖐️ 운명의 손</button>
  </div>
  <div id="actions">
    <button id="spinBtn">🎰 스핀</button>
    <button class="subBtn" id="coinBtn">🪙 <b id="coinTxt">0</b></button>
  </div>
  <div id="log"></div>
  <small class="ver">어반 로어: 운명의 거리 — 프로토타입 v0.8 · 20 스테이지 · BIGINFIVE</small>
  <div id="ovl"><div id="ovlBox"></div></div>
</div>
<script>
"use strict";
const CATS = {
  atk:{name:"공격",color:"#e5484d",w:1.3,price:3}, def:{name:"방어",color:"#4f8df0",w:1.3,price:3},
  heal:{name:"회복",color:"#2ecc71",w:1.0,price:4}, psn:{name:"독",color:"#a855f7",w:1.0,price:4},
  coin:{name:"코인",color:"#eab308",w:0.8,price:5}, luck:{name:"행운",color:"#9acd32",w:0.8,price:5},
  ghost:{name:"괴담",color:"#8d8d99",w:0.5,price:7},
};
const KINDS = {
  sword:{cat:"atk",name:"검",em:"⚔️",pow:2,desc:"공격 2 · 강화 +3 · 각성: 이번 턴 모든 공격 +2"},
  gun:{cat:"atk",name:"총",em:"🔫",pow:2,desc:"공격 1×2 · 강화 3연발 · 각성 15% 기절"},
  bow:{cat:"atk",name:"활",em:"🏹",pow:1,desc:"공격 1, 방어 무시 · 강화 +2 · 각성 +4"},
  shield:{cat:"def",name:"방패",em:"🛡️",pow:2,desc:"방어 2 · 강화 +3 · 각성: 방어 이월"},
  helmet:{cat:"def",name:"헬멧",em:"🪖",pow:1,desc:"방어 1 · 강화 +2 · 각성 회복 2"},
  thorn:{cat:"def",name:"가시방패",em:"🦔",pow:1,desc:"방어 1, 반사 · 강화 반사2배 · 각성 +독"},
  cherry:{cat:"heal",name:"체리",em:"🍒",pow:2,desc:"회복 2 · 강화 +3 · 각성 최대HP+1"},
  herb:{cat:"heal",name:"약초",em:"🌿",pow:1,desc:"회복 1, 정화 · 강화 저주1정화 · 각성 공격"},
  bento:{cat:"heal",name:"도시락",em:"🍱",pow:1,desc:"회복1+코인1 · 강화 코인+2 · 각성 4택"},
  poison:{cat:"psn",name:"독병",em:"🧪",pow:2,desc:"독+2 · 강화 +4 · 각성 독 유지"},
  spike:{cat:"psn",name:"가시",em:"🌵",pow:1,desc:"공1+독1 · 강화 각+1 · 각성 독폭발"},
  spider:{cat:"psn",name:"거미",em:"🕷️",pow:1,desc:"독+1 · 강화 +3 · 각성 30%기절"},
  coin1:{cat:"coin",name:"동전",em:"🪙",pow:2,desc:"코인2 · 강화 +3 · 각성 돈던지기"},
  bill:{cat:"coin",name:"지폐",em:"💵",pow:3,desc:"코인3 · 강화 +5 · 각성 상점무료"},
  piggy:{cat:"coin",name:"저금통",em:"🐷",pow:1,desc:"코인1적립 · 강화 ×2 · 각성 ×3"},
  clover:{cat:"luck",name:"클로버",em:"🍀",pow:1,desc:"게이지+1 · 강화 +3 · 각성 +5"},
  dice:{cat:"luck",name:"주사위",em:"🎲",pow:2,desc:"공·방·회 무작위2 · 강화 4 · 각성 셋다3"},
  candy:{cat:"luck",name:"별사탕",em:"🍬",pow:1,desc:"회1+게이지1 · 강화 코인+2 · 각성 리롤"},
  note:{cat:"ghost",name:"괴담노트",em:"📓",pow:3,desc:"공격3 · 강화 +4·적공-1 · 각성 봉인"},
  doppel:{cat:"ghost",name:"도플갱어",em:"👥",pow:1,desc:"인접 종류로 변해 합체에 가담"},
  clock:{cat:"ghost",name:"시계태엽",em:"⚙️",pow:1,desc:"문양 1개 재정산 · 강화 2개"},
  curse:{cat:"curse",name:"꽝",em:"❌",pow:0,desc:"발동 없음·이웃 불인정"},
  crack:{cat:"curse",name:"균열",em:"🕳️",pow:0,desc:"이웃은 되나 인접 위력 -1"},
  fog:{cat:"curse",name:"검은 안개",em:"🌫️",pow:0,desc:"십자 문양 무효·번짐"},
  nightmare:{cat:"curse",name:"악몽",em:"😱",pow:0,desc:"등장 시 HP-1·삭제 8코인"},
};
const BADGES = {
  amulet:{name:"운세 부적",em:"🧿",desc:"매 턴 운명 게이지 +1"},
  compass:{name:"괴담 나침반",em:"🧭",desc:"매 턴 최다 계열 2개가 붙어 배치"},
  whetstone:{name:"숫돌",em:"🪨",desc:"공격 계열 위력 +1"},
  aidkit:{name:"구급 가방",em:"⛑️",desc:"회복 계열 위력 +1"},
};
const CHARS = [
  {id:"luka",name:"루카",team:"괴담",sig:"note",sigName:"괴담 수첩",trait:"괴담 계열은 고립이어도 발동"},
  {id:"tava",name:"타바레스",team:"회복",sig:"cherry",sigName:"약병",trait:"과회복 전환 100%"},
  {id:"good",name:"굿맨",team:"공격",sig:"sword",sigName:"식칼",trait:"합체(2개+)마다 위력 +1"},
  {id:"sunny",name:"써니",team:"행운",sig:"dice",sigName:"물음표 상자",trait:"운명의 손 필요 게이지 -2"},
];
const ETYPES = {
  slime:{name:"슬라임",em:"🟢",hp:12,pat:[{t:"atk",v:3},{t:"atk",v:3}]},

  boss_final:{name:"심연의 군주",em:"👁️",hp:230,boss:true,pat:[{t:"rule"},{t:"atk",v:9},{t:"curse"},{t:"atk",v:12}]},
};
const STAGE_DEF = [
  ["slime"],["slime","slime"],["rat","slime"],["dog","dog"],["boss_sirius"],
  ["doll","doll"],["lantern","doll"],["dog","dog","slime"],["hand","hand"],["boss_doppel"],
  ["doll","hand"],["mirror","doll"],["eater","dog"],["hand","hand","doll"],["boss_dant"],
  ["eater","mirror"],["hand","eater"],["mirror","mirror","doll"],["eater","eater"],["boss_final"],
];
const RUN_PATTERNS = {3:{mult:1.5,name:"삼연"},4:{mult:2,name:"사연"},5:{mult:3,name:"오연"}};
const FATE_TIERS = [
  {name:"오연",shape:"row",size:5,cost:10,q:0.90,mult:"×3"},
  {name:"결계",shape:"ring",size:14,cost:16,q:0.94,mult:"×7"},
  {name:"대공명",shape:"all",size:20,cost:22,q:0.94,mult:"×10"},
];
const ROWS=4,COLS=5,N=20;

let S=null;
const CHAPTER_BOSS=[5,10,15];   // 20은 최종(게임 끝) — 리셋 대상 아님
function baseDeck(ch){ return ["sword","sword","shield","shield","cherry","cherry","clover",ch.sig].map(k=>({k,sig:k===ch.sig})); }
function newRun(charIdx){
  const ch=CHARS[charIdx];
  S={ char:ch, hp:30, maxHp:30, block:0, carryBlock:false, coins:10, gauge:0,
    deck:baseDeck(ch),
    stage:1, enemies:[], reflect:0, reflectPsn:false,
    bank:0, rerollTokens:0, shopFree:false, draft4:false, fatePlan:null, bossRule:null, bossRuleUsed:false,
    badges:[], pinTokens:1, pin:null, turn:0, psnHold:false,
    focus:null, banned:[],
    stats:{turns:0,dmg:0,best:0,patterns:0,fateTry:0,fateWin:0,merges:0,stagesCleared:0},
    cells:[], phase:"spin" };
  startStage();
}
function buildEnemies(stage){
  const defs=STAGE_DEF[stage-1];
  const m=1+0.14*(stage-1), atkBonus=Math.floor((stage-1)/3);
  return defs.map(key=>{ const t=ETYPES[key];
    const hp=Math.round(t.hp*(t.boss?(1+0.05*(stage-1)):m));
    return { key,name:t.name,em:t.em,boss:!!t.boss,elite:!!t.elite, hp, eHp:hp,
      block:0, psn:0, stun:false, seal:false, atkDown:0, idx:0,
      pat:t.pat.map(a=>({...a, v:a.v?a.v+atkBonus:a.v})) }; });
}
function startStage(){
  S.enemies=buildEnemies(S.stage);
  S.block=0; S.carryBlock=false; S.bossRule=null; S.bossRuleUsed=false; S.turn=0; S.phase="spin";
  S.cells=Array(N).fill(null); S._shopOffers=null; S._shopBadge=null; S._rested=false;
  renderBoard(null,[],null,[]);
  log(`<span class="hl">⚔ 스테이지 ${S.stage}</span> — ${S.enemies.map(e=>e.name).join(", ")}`);
  render();
}
function aliveIdx(){ return S.enemies.map((e,i)=>e.eHp>0?i:-1).filter(i=>i>=0); }
function frontIdx(){ return S.enemies.findIndex(e=>e.eHp>0); }
function frontEnemy(){ const i=frontIdx(); return i>=0?S.enemies[i]:null; }

function neighbors(i){ const r=Math.floor(i/COLS),c=i%COLS,out=[];
  if(r>0)out.push(i-COLS); if(r<ROWS-1)out.push(i+COLS); if(c>0)out.push(i-1); if(c<COLS-1)out.push(i+1); return out; }
function lines(){ const L=[];
  for(let r=0;r<ROWS;r++){ const a=[...Array(COLS)].map((_,c)=>r*COLS+c); a.diag=false; L.push(a); }
  for(let c=0;c<COLS;c++){ const a=[...Array(ROWS)].map((_,r)=>r*COLS+c); a.diag=false; L.push(a); }
  for(let s=-ROWS;s<=COLS;s++){ const d=[]; for(let r=0;r<ROWS;r++){const c=s+r; if(c>=0&&c<COLS)d.push(r*COLS+c);} if(d.length>=3){d.diag=true;L.push(d);} }
  for(let s=0;s<COLS+ROWS;s++){ const d=[]; for(let r=0;r<ROWS;r++){const c=s-r; if(c>=0&&c<COLS)d.push(r*COLS+c);} if(d.length>=3){d.diag=true;L.push(d);} }
  return L; }
const PERIM=[...Array(N).keys()].filter(i=>{const r=Math.floor(i/COLS),c=i%COLS;return r===0||r===ROWS-1||c===0||c===COLS-1;});
function detectPatterns(cells){
  const mult=Array(N).fill(1), pats=[];
  const blocked=new Set();
  for(let i=0;i<N;i++) if(cells[i]&&cells[i].k==="fog"){ blocked.add(i); neighbors(i).forEach(j=>blocked.add(j)); }
  const cat=i=>(!blocked.has(i)&&cells[i]&&KINDS[cells[i].k].cat!=="curse")?KINDS[cells[i].k].cat:null;
  const addPat=(name,c,m,cs)=>{ pats.push({name,cat:c,mult:m,cells:cs}); cs.forEach(i=>mult[i]=Math.max(mult[i],m)); };
  const c0=cat(0); const grand=!!(c0&&[...Array(N).keys()].every(i=>cat(i)===c0));
  if(grand) addPat("대공명",c0,10,[...Array(N).keys()]);
  const pc=cat(PERIM[0]); if(pc&&PERIM.every(i=>cat(i)===pc)) addPat("결계",pc,7,[...PERIM]);
  for(let r=0;r+2<ROWS;r++){
    const mtn=[(r+2)*COLS+0,(r+1)*COLS+1,r*COLS+2,(r+1)*COLS+3,(r+2)*COLS+4];
    const val=[r*COLS+0,(r+1)*COLS+1,(r+2)*COLS+2,(r+1)*COLS+3,r*COLS+4];
    for(const[nm,cs]of[["산",mtn],["골",val]]){ const c=cat(cs[0]); if(c&&cs.every(i=>cat(i)===c)) addPat(nm,c,5,cs); }
  }
  for(let r=0;r+1<ROWS;r++){
    const zig=[r*COLS+0,(r+1)*COLS+1,r*COLS+2,(r+1)*COLS+3,r*COLS+4];
    const zag=[(r+1)*COLS+0,r*COLS+1,(r+1)*COLS+2,r*COLS+3,(r+1)*COLS+4];
    for(const cs of[zig,zag]){ const c=cat(cs[0]); if(c&&cs.every(i=>cat(i)===c)) addPat("번개",c,4,cs); }
  }
  for(const line of lines()){
    if(line.diag&&S&&S.bossRule&&S.bossRule.kind==="noDiag") continue;
    let s=0;
    while(s<line.length){ const c=cat(line[s]); if(!c){s++;continue;}
      let e=s; while(e+1<line.length&&cat(line[e+1])===c) e++;
      const len=e-s+1;
      if(len>=3){ const def=RUN_PATTERNS[Math.min(len,5)]; addPat(def.name,c,def.mult,line.slice(s,e+1)); }
      s=e+1; }
  }
  const kept=pats.filter((p,pi)=> p.name==="대공명" || !pats.some((q,qi)=> qi!==pi && q.name!=="대공명" && q.cells.length>p.cells.length && p.cells.every(c2=>q.cells.includes(c2))));
  return {mult,pats:kept,grand};
}
function getActive(cells,mult,pats){
  const inPat=new Set(); pats.forEach(p=>p.cells.forEach(i=>inPat.add(i)));
  const active=new Set(), misfires=[];
  for(let i=0;i<N;i++){ const s=cells[i]; if(!s||KINDS[s.k].cat==="curse") continue;
    const kcat=KINDS[s.k].cat;
    if(S.bossRule&&S.bossRule.kind==="ban"&&kcat===S.bossRule.cat){ misfires.push(i); continue; }
    const hasNb=neighbors(i).some(j=>{ const nb=cells[j]; if(!nb) return false;
      if(nb.k==="crack") return true; if(KINDS[nb.k].cat==="curse") return false;
      if(s.k==="doppel"||nb.k==="doppel") return true; return KINDS[nb.k].cat===kcat; });
    const lukaPass=S.char.id==="luka"&&kcat==="ghost";
    if(hasNb||inPat.has(i)||lukaPass) active.add(i); else misfires.push(i);
  }
  return {active,misfires};
}
function coefOf(n){ return n>=5?2.5:n===4?2:n===3?1.5:n===2?1.2:1; }
function tierOf(n){ return n>=4?2:n===3?1:0; }

const sleep=ms=>new Promise(r=>setTimeout(r,(typeof window!=="undefined"&&window.__FAST)?0:ms));
function topCatOf(deck){ const cnt={}; deck.forEach(e=>{const c=KINDS[e.k].cat; if(c!=="curse")cnt[c]=(cnt[c]||0)+1;});
  const ent=Object.entries(cnt).sort((a,b)=>b[1]-a[1]); return ent.length?ent[0][0]:"atk"; }
function fateArrange(deck,tier){
  const cells=Array(N).fill(null); const topCat=topCatOf(deck);
  const target=tier.shape==="row"?(()=>{const r=Math.floor(Math.random()*ROWS);return[...Array(COLS)].map((_,c)=>r*COLS+c);})()
    :tier.shape==="ring"?[...PERIM]:[...Array(N).keys()];
  const tops=shuffle(deck.filter(e=>KINDS[e.k].cat===topCat));
  const others=shuffle(deck.filter(e=>KINDS[e.k].cat!==topCat));
  let ti=0;
  for(const c of shuffle([...target])){ if(ti<tops.length&&Math.random()<tier.q){ cells[c]=tops[ti++]; } }
  const rest=shuffle([...tops.slice(ti),...others]);
  for(const e of rest){ const free=[...Array(N).keys()].filter(i=>!cells[i]); if(!free.length||cells.filter(Boolean).length>=N)break; cells[free[Math.floor(Math.random()*free.length)]]=e; }
  const success=target.every(i=>cells[i]&&KINDS[cells[i].k].cat===topCat);
  return {cells,success,topCat};
}
function estimateFate(tier,deck){ let w=0,T=250; for(let t=0;t<T;t++){if(fateArrange(deck,tier).success)w++;} return Math.max(1,Math.min(99,Math.round(w/T*100))); }
function placeBoard(){
  S.cells=Array(N).fill(null);
  if(S.fatePlan){ const r=fateArrange(S.deck,S.fatePlan.tier); S.cells=r.cells; S.fateResult={success:r.success,tier:S.fatePlan.tier}; }
  else {
    let pool=shuffle([...S.deck]).slice(0,N);
    if(S.pin){ const pi=pool.findIndex(e=>e.k===S.pin.k);
      if(pi>=0&&!S.cells[S.pin.cell]){ S.cells[S.pin.cell]=pool.splice(pi,1)[0]; log(`📌 ${KINDS[S.pin.k].name} 고정 배치!`); } S.pin=null; }
    if(S.badges.includes("compass")){ const tc=topCategory(); const tops=[];
      for(let i2=pool.length-1;i2>=0&&tops.length<2;i2--){ if(KINDS[pool[i2].k].cat===tc) tops.push(pool.splice(i2,1)[0]); }
      if(tops.length===2){ const free=freeCells(); const a=free[Math.floor(Math.random()*free.length)];
        const nbs=neighbors(a).filter(j=>!S.cells[j]);
        if(nbs.length){ S.cells[a]=tops[0]; S.cells[nbs[Math.floor(Math.random()*nbs.length)]]=tops[1]; } else pool.push(...tops);
      } else pool.push(...tops); }
    for(const e of pool){ const f=freeCells(); if(!f.length)break; S.cells[f[Math.floor(Math.random()*f.length)]]=e; }
    S.fateResult=null;
  }
}
function freeCells(){ return [...Array(N).keys()].filter(i=>!S.cells[i]); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function topCategory(){ const cnt={}; S.deck.forEach(e=>{const c=KINDS[e.k].cat; if(c!=="curse")cnt[c]=(cnt[c]||0)+1;});
  return Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0][0]; }

const SPIN_POOL=Object.keys(KINDS).filter(k=>KINDS[k].cat!=="curse");
function cellHTML(s){ if(!s)return ""; const kd=KINDS[s.k]; return `${kd.em}<span class="nm">${kd.name}${s.sig?"★":""}</span>`; }
// CloverPit식 릴 스핀: 빠르게 돌다 왼쪽 열부터 순차 정지 + 앤티시페이션
function spinReel(hasPattern,grand){
  return new Promise(res=>{
    const b=document.getElementById("board"); if(!b){res();return;}
    renderBoard(null,[],null,[]);
    const els=[...b.children];
    if(typeof window==="undefined"||window.__FAST){ for(let i=0;i<N;i++)els[i].innerHTML=cellHTML(S.cells[i]); res(); return; }
    const machine=document.getElementById("machine");
    const locked=Array(N).fill(false);
    // 열별 정지 시각 — 마지막 열은 패턴 가능성 있으면 더 늦게(앤티시페이션)
    const colLockAt=[]; for(let c=0;c<COLS;c++){ let t=300+c*170; if(c===COLS-1&&hasPattern)t+=420; colLockAt.push(t); }
    const start=performance.now(); let lastSwap=0;
    function frame(now){
      const t=now-start; const swap=now-lastSwap>55; if(swap)lastSwap=now;
      for(let i=0;i<N;i++){ const c=i%COLS; const el=els[i];
        if(locked[i])continue;
        if(t>=colLockAt[c]){ locked[i]=true; el.classList.remove("spinning"); el.style.transform=""; el.style.filter="";
          el.innerHTML=cellHTML(S.cells[i]); el.classList.add("settle"); setTimeout(()=>el.classList.remove("settle"),220);
          if(c===COLS-1&&machine&&(grand||hasPattern)){ const fc=grand?"bigflash":"flash"; machine.classList.remove(fc); void machine.offsetWidth; machine.classList.add(fc); setTimeout(()=>machine.classList.remove(fc),820); }
        } else { if(!el.classList.contains("spinning"))el.classList.add("spinning");
          if(swap){ const rk=SPIN_POOL[Math.floor(Math.random()*SPIN_POOL.length)]; el.innerHTML=KINDS[rk].em; } }
      }
      if(locked.every(Boolean)){ res(); return; }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  });
}
// 던전크롤러식 발동 연출 — 발동 심볼이 캐릭터에서 시전/발사. 개수↑ = 이펙트↑
function symbolFx(k,n,tier){
  if(typeof window==="undefined"||window.__FAST) return;
  const stage=document.getElementById("stage"); if(!stage) return;
  const kd=KINDS[k]; const cat=kd.cat; const em=kd.em;
  const offensive=(cat==="atk"||cat==="psn"||(cat==="ghost"&&k==="note")||(cat==="coin"&&tier===2));
  const player=document.getElementById("player");
  const count=Math.min(offensive?6:4, Math.max(1,n));
  if(offensive){
    if(player){ player.classList.remove("cast"); void player.offsetWidth; player.classList.add("cast"); }
    for(let j=0;j<count;j++){ setTimeout(()=>{
      const p=document.createElement("div"); p.className="proj"; p.textContent=em;
      p.style.fontSize=(20+(tier?6:0)+(n>=4?6:0))+"px";
      p.style.left="15%"; p.style.bottom=(60+ (Math.random()*44-22))+"px";
      if(tier===2)p.style.filter="drop-shadow(0 0 8px #ffd36b)";
      stage.appendChild(p);
      requestAnimationFrame(()=>{ p.style.transition="left .40s cubic-bezier(.45,0,.75,1), bottom .40s, transform .40s, opacity .1s";
        p.style.left="78%"; p.style.bottom=(58+(Math.random()*40-20))+"px"; p.style.transform=`rotate(${(Math.random()*30-15)|0}deg) scale(1.1)`; });
      setTimeout(()=>{ impactBurst(em,n,tier); p.remove(); }, 410);
    }, j*65); }
  } else {
    // 방어/회복/행운/코인적립 — 캐릭터 주위 오라
    if(player){ player.classList.remove("glow"); void player.offsetWidth; player.classList.add("glow"); }
    for(let j=0;j<count;j++){ setTimeout(()=>{
      const a=document.createElement("div"); a.className="aura"; a.textContent=em;
      a.style.fontSize=(20+(tier?6:0))+"px";
      a.style.left=(7+Math.random()*9)+"%"; a.style.bottom=(60+Math.random()*20)+"px";
      stage.appendChild(a); setTimeout(()=>a.remove(),760);
    }, j*80); }
  }
}
function impactBurst(em,n,tier){
  const stage=document.getElementById("stage"); if(!stage) return;
  const host=document.querySelector(".enemy.target");
  const burst=document.createElement("div"); burst.className="impact"; burst.textContent="💥";
  burst.style.fontSize=(18+Math.min(4,n)*4+(tier===2?8:0))+"px";
  burst.style.left=(76+Math.random()*8)+"%"; burst.style.bottom=(58+(Math.random()*36-18))+"px";
  stage.appendChild(burst); setTimeout(()=>burst.remove(),440);
  if(host){ host.classList.remove("hit"); void host.offsetWidth; host.classList.add("hit"); setTimeout(()=>host.classList.remove("hit"),300); }
}
function priceOf(cat){ return Math.round(CATS[cat].price*(1+0.2*(S.stage-1))); }

async function doSpin(){
  if(S.phase==="busy"&&!document.getElementById("ovl").classList.contains("show")&&S.busyAt&&Date.now()-S.busyAt>6000){ S.phase="spin"; render(); return; }
  if(S.phase!=="spin") return;
  S.busyAt=Date.now(); S.phase="busy"; S.turn++; S.stats.turns++;
  if(!S.carryBlock) S.block=0; S.carryBlock=false;
  placeBoard(); render();
  const pre=detectPatterns(S.cells);
  await spinReel(pre.pats.length>0, pre.grand); await sleep(140);
  if(S.fateResult){ S.stats.fateTry++;
    if(S.fateResult.success){ S.stats.fateWin++; log(`<span class="good">🖐️ 운명의 손 — ${S.fateResult.tier.name} 성공!</span>`); }
    else { const r=Math.ceil(S.fateResult.tier.cost/2); S.gauge=Math.min(22,S.gauge+r); log(`🖐️ 운명의 손 — ${S.fateResult.tier.name} 실패… 게이지 ${r} 환불`); }
    S.fatePlan=null; }
  const {mult,pats,grand}=detectPatterns(S.cells);
  S.grandEcho=grand?pats.filter(p=>p.name!=="대공명"):null;
  const {active,misfires}=getActive(S.cells,mult,pats);
  S.stats.patterns+=pats.length;
  renderBoard(active,misfires,mult,pats);
  if(pats.length) log(`<span class="hl">✦ 문양: ${pats.map(p=>p.name+"("+CATS[p.cat].name+")").join(", ")}</span>`);
  const nmCount=S.cells.filter(c=>c&&c.k==="nightmare").length;
  if(nmCount){ S.hp=Math.max(0,S.hp-nmCount); log(`😱 악몽 — HP -${nmCount}`); if(S.hp<=0){ gameOver(false); return; } }
  if(S.cells.some(c=>c&&c.k==="fog")&&S.deck.filter(e=>e.k==="fog").length<2&&Math.random()<0.3){ S.deck.push({k:"fog"}); log("🌫️ 안개가 덱으로 번졌다…"); }
  if(misfires.length){ const g=Math.min(2,misfires.length); S.gauge=Math.min(22,S.gauge+g); log(`불발 ${misfires.length}개 → 게이지 +${g}${misfires.length>2?" (턴당 최대 2)":""}`); }
  if(S.badges.includes("amulet")){ S.gauge=Math.min(22,S.gauge+1); log("🧿 운세 부적 — 게이지 +1"); }
  await sleep(540);
  await resolve(active,mult,pats);
  if(S.grandEcho&&S.grandEcho.length&&frontIdx()>=0){
    for(const p2 of S.grandEcho){ const v=Math.round(p2.cells.reduce((s2,i)=>S.cells[i]?s2+KINDS[S.cells[i].k].pow*p2.mult:s2,0));
      if(v>0){ applyCatValue(p2.cat,v); log(`🌌 대공명 — ${p2.name} 동시 정산 +${v}`); await sleep(140);} }
    S.grandEcho=null;
  }
  if(frontIdx()<0){ await winStage(); return; }
  await sleep(650);
  S.phase="draft"; render(); openDraft();
}

async function resolve(active,mult,pats){
  const eff={};
  for(const i of active){ const k=S.cells[i].k; if(k!=="doppel"){eff[i]=k;continue;}
    const counts={}; neighbors(i).forEach(j=>{ if(active.has(j)&&S.cells[j].k!=="doppel"&&S.cells[j].k!=="curse"){counts[S.cells[j].k]=(counts[S.cells[j].k]||0)+1;} });
    const best=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0]; eff[i]=best?best[0]:"doppel"; }
  const groups={}; for(const i of active){ const k=eff[i]; (groups[k]=groups[k]||[]).push(i); }
  const order=["def","heal","luck","coin","psn","atk","ghost"];
  let turnAtkBonus=0, overheal=0, pendingThrow=false;
  const gk=Object.keys(groups).sort((a,b)=>order.indexOf(KINDS[a]?KINDS[a].cat:"ghost")-order.indexOf(KINDS[b]?KINDS[b].cat:"ghost"));
  for(const k of gk){ if(k==="doppel")continue;
    const cellsIdx=groups[k], kind=KINDS[k], n=cellsIdx.length;
    const scatter=S.bossRule&&S.bossRule.kind==="noMerge";
    const coef=scatter?1:coefOf(n), tier=scatter?0:tierOf(n);
    const badgePow=(S.badges.includes("whetstone")&&kind.cat==="atk"?1:0)+(S.badges.includes("aidkit")&&kind.cat==="heal"?1:0);
    let total=cellsIdx.reduce((s,i)=>{ let pw=kind.pow+badgePow; if(neighbors(i).some(j=>S.cells[j]&&S.cells[j].k==="crack"))pw=Math.max(0,pw-1); return s+pw*mult[i]; },0)*coef;
    if(S.char.id==="good"&&n>=2)total+=1; total=Math.round(total);
    if(n>=2)S.stats.merges++; popCells(cellsIdx);
    symbolFx(k,n,tier); await sleep(90);
    const tt=tier===2?" [각성]":tier===1?" [강화]":"";
    switch(kind.cat){
      case "atk":{ let dmg=total;
        if(k==="sword"){ if(tier>=1)dmg+=3; if(tier===2)turnAtkBonus+=2; }
        if(k==="gun"){ if(tier>=1)dmg+=n; if(tier===2&&Math.random()<0.15*n){ const fe=frontEnemy(); if(fe)fe.stun=true; log("💫 적 기절!"); } }
        if(k==="bow"){ if(tier>=1)dmg+=2; if(tier===2)dmg+=2; }
        dmg+=turnAtkBonus; dealDamage(dmg,k==="bow",`${kind.em}${kind.name}×${n}${tt}`); break; }
      case "def":{ let b=total;
        if(k==="shield"){ if(tier>=1)b+=3; if(tier===2)S.carryBlock=true; }
        if(k==="helmet"){ if(tier>=1)b+=2; if(tier===2)healP(2); }
        if(k==="thorn"){ S.reflect=(tier>=1?2:1); if(tier===2)S.reflectPsn=true; }
        S.block+=b; log(`${kind.em}${kind.name}×${n}${tt} → 방어 +${b}`); break; }
      case "heal":{ let h=total, ec=0;
        if(k==="cherry"){ if(tier>=1)h+=3; if(tier===2){S.maxHp+=1; log("💗 최대 HP +1");} }
        if(k==="herb"&&tier>=1){ const ci=S.deck.findIndex(e=>e.k==="curse"); if(ci>=0){S.deck.splice(ci,1); log("🌿 덱의 꽝 1개 정화!"); if(tier===2)dealDamage(2,false,"정화의 빛");} }
        if(k==="bento"){ ec=n*1+(tier>=1?2:0); if(tier===2)S.draft4=true; }
        if(ec){S.coins+=ec; log(`🍱 코인 +${ec}`);}
        const room=S.maxHp-S.hp;
        if(h>room){ const over=h-room; const conv=Math.round(over*(S.char.id==="tava"?1:0.5)); if(conv>0){overheal+=conv; log(`과회복 ${over} → 전환 피해 +${conv}`);} }
        healP(h); log(`${kind.em}${kind.name}×${n}${tt} → 회복`); break; }
      case "psn":{
        if(k==="poison"){ let p2=total; if(tier>=1)p2+=4; if(tier===2)S.psnHold=true; addPsn(p2); }
        if(k==="spike"){ let d=total,p2=n; if(tier>=1){d+=1;p2+=1;} addPsn(p2); dealDamage(d,false,`${kind.em}가시×${n}${tt}`); const fe=frontEnemy(); if(tier===2&&fe&&fe.psn>0)dealDamage(fe.psn,true,"독 폭발"); }
        if(k==="spider"){ const fe=frontEnemy(); let p2=n*(fe&&fe.psn>0?3:1); if(tier>=1)p2+=3; addPsn(p2); if(tier===2&&Math.random()<0.3){ if(fe)fe.stun=true; log("💫 거미줄 — 적 기절!"); } }
        log(`${kind.em}${kind.name}×${n}${tt} 발동`); break; }
      case "coin":{
        if(k==="coin1"){ let c=total; if(tier>=1)c+=3; S.coins+=c; log(`🪙 동전×${n}${tt} → 코인 +${c}`); if(tier===2)pendingThrow=true; }
        if(k==="bill"){ let c=total; if(tier>=1)c+=5; S.coins+=c; log(`💵 지폐×${n}${tt} → 코인 +${c}`); if(tier===2){S.shopFree=true; log("🏷️ 다음 상점 1회 무료!");} }
        if(k==="piggy"){ S.bank+=n; if(tier>=1){ const pay=S.bank*(tier===2?3:2); S.coins+=pay; log(`🐷 저금통 개봉! 코인 +${pay}`); S.bank=0; } else log(`🐷 저금통 적립 ${S.bank}`); }
        break; }
      case "luck":{
        if(k==="clover"){ let g=total; if(tier>=1)g+=3; if(tier===2)g+=2; S.gauge=Math.min(22,S.gauge+g); log(`🍀 클로버×${n}${tt} → 게이지 +${g}`); }
        if(k==="dice"){ if(tier===2){ dealDamage(3,false,"🎲"); S.block+=3; healP(3); log("🎲 각성 — 공·방·회 3씩!"); }
          else { const amt=2*n+(tier===1?2:0); const r=Math.floor(Math.random()*3);
            if(r===0)dealDamage(amt,false,`🎲주사위×${n}`); else if(r===1){S.block+=amt; log(`🎲 방어 +${amt}`);} else {healP(amt); log(`🎲 회복 +${amt}`);} } }
        if(k==="candy"){ healP(n); S.gauge=Math.min(22,S.gauge+n); let ex="";
          if(tier>=1){S.coins+=2;ex=" 코인+2";} if(tier===2){S.rerollTokens++;ex+=" 리롤+1";}
          log(`🍬 별사탕×${n} → 회복+게이지 +${n}${ex}`); }
        break; }
      case "ghost":{
        if(k==="note"){ let d=total; if(tier>=1){d+=4; const fe=frontEnemy(); if(fe)fe.atkDown+=1; log("📓 적 공격 -1");}
          if(tier===2){ const fe=frontEnemy(); if(fe){fe.seal=true; log("📓 봉인 — 적 다음 행동 취소!");} }
          dealDamage(d+turnAtkBonus,false,`📓괴담노트×${n}${tt}`); }
        if(k==="clock"){ const reN=(tier>=1?2:1); const top=[...pats].sort((a,b)=>b.mult-a.mult).slice(0,reN);
          for(const p of top){ const v=Math.round(p.cells.reduce((s,i)=>S.cells[i]&&KINDS[S.cells[i].k].cat===p.cat?s+KINDS[S.cells[i].k].pow*p.mult:s,0)); if(v>0){ applyCatValue(p.cat,v); log(`⚙️ ${p.name} 재정산 → ${CATS[p.cat].name} +${v}`);} } }
        break; }
    }
    render(); await sleep(330); if(frontIdx()<0) return;
  }
  if(overheal>0&&frontIdx()>=0){ dealDamage(overheal,false,"과회복 전환"); await sleep(220); }
  if(pendingThrow&&frontIdx()>=0){ await askMoneyThrow(); }
}
function applyCatValue(cat,v){
  if(cat==="atk"||cat==="ghost") dealDamage(v,false,"재정산");
  else if(cat==="def") S.block+=v; else if(cat==="heal") healP(v);
  else if(cat==="psn") addPsn(v); else if(cat==="coin") S.coins+=v; else if(cat==="luck") S.gauge=Math.min(22,S.gauge+v);
}
function dealDamage(d,pierce,src){
  if(d<=0) return; const i=frontIdx(); if(i<0) return; const e=S.enemies[i]; let dmg=d;
  if(!pierce&&e.block>0){ const ab=Math.min(e.block,dmg); e.block-=ab; dmg-=ab; if(ab)log(`(보호막 ${ab} 흡수)`); }
  e.eHp=Math.max(0,e.eHp-dmg); S.stats.dmg+=dmg; S.stats.best=Math.max(S.stats.best,dmg);
  if(dmg>0){ log(`<span class="dmg">▶ ${src} — ${dmg} 피해!</span>`); floatNum("#enemies","-"+dmg,"#ff8a8a"); shakeEnemy(i); }
  render();
}
function healP(h){ if(h<=0)return; S.hp=Math.min(S.maxHp,S.hp+h); render(); }
function addPsn(p){ const e=frontEnemy(); if(!e)return; e.psn+=p; log(`☠️ 적 독 +${p} (현재 ${e.psn})`); }
function floatNum(sel,txt,color){ const host=document.querySelector(sel); if(!host)return; const el=document.createElement("div");
  el.className="floatdmg"; el.textContent=txt; el.style.color=color; el.style.left=(20+Math.random()*50)+"%"; el.style.top="0px"; host.appendChild(el); setTimeout(()=>el.remove(),900); }
function shakeEnemy(i){ const el=document.querySelector(`[data-enemy="${i}"] .sprite`); if(el){el.parentElement.classList.add("shake"); setTimeout(()=>el.parentElement.classList.remove("shake"),350);} }

async function enemyTurn(){
  S.phase="busy"; render(); await sleep(350);
  for(const e of S.enemies){ if(e.eHp>0&&e.psn>0){ e.eHp=Math.max(0,e.eHp-e.psn); if(!S.psnHold) e.psn=Math.max(0,e.psn-1); } }
  S.psnHold=false; render();
  if(S.enemies.some(e=>e.psn>0)){ log("☠️ 독 피해 정산"); await sleep(280); }
  if(frontIdx()<0){ await winStage(); return; }
  for(let i=0;i<S.enemies.length;i++){ const e=S.enemies[i]; if(e.eHp<=0) continue;
    if(e.seal){ log(`⛓️ ${e.name} 봉인!`); e.seal=false; continue; }
    if(e.stun){ log(`💫 ${e.name} 기절!`); e.stun=false; continue; }
    const act=e.pat[e.idx%e.pat.length]; e.idx++;
    if(act.t==="atk"){ let dmg=Math.max(0,act.v-e.atkDown);
      const blk=Math.min(S.block,dmg); const thru=dmg-blk; S.block-=blk;
      if(thru>0){ S.hp=Math.max(0,S.hp-thru); floatNum("#player","-"+thru,"#ff8a8a"); document.getElementById("player").classList.add("shake"); setTimeout(()=>document.getElementById("player").classList.remove("shake"),350); }
      log(`👿 ${e.name}: 공격 ${act.v}${e.atkDown?`(-${e.atkDown})`:""} → ${blk?`방어 ${blk} / `:""}피해 ${thru}`);
      if(S.reflect&&blk>0){ const rd=blk*S.reflect; dealDamage(rd,true,"🦔 가시 반사"); if(S.reflectPsn)addPsn(1); }
    } else if(act.t==="heal"){ e.eHp=Math.min(e.hp,e.eHp+act.v); log(`👿 ${e.name}: 회복 ${act.v}`); }
    else if(act.t==="block"){ e.block+=act.v; log(`👿 ${e.name}: 보호막 ${act.v}`); }
    else if(act.t==="curse"){ const ck=e.boss?["curse","crack","fog","nightmare"][Math.floor(Math.random()*4)]:"curse"; S.deck.push({k:ck}); log(`👿 ${e.name}: 덱에 ${KINDS[ck].name} 삽입!`); }
    else if(act.t==="rule"){ const roll=Math.random();
      if(roll<0.4){ const cats=["atk","def","heal","psn","coin","luck","ghost"]; S.bossRule={kind:"ban",cat:cats[Math.floor(Math.random()*cats.length)]}; log(`👿 괴담 규칙 — <span class="hl">"조용히 해!" 다음 턴 ${CATS[S.bossRule.cat].name} 발동 금지</span>`); }
      else if(roll<0.7){ S.bossRule={kind:"noDiag"}; log(`👿 괴담 규칙 — <span class="hl">"떨어져!" 다음 턴 대각 문양 금지</span>`); }
      else { S.bossRule={kind:"noMerge"}; log(`👿 괴담 규칙 — <span class="hl">"흩어져!" 다음 턴 합체 금지</span>`); }
      S.bossRuleUsed=false; }
    render(); await sleep(300);
    if(S.hp<=0){ gameOver(false); return; }
  }
  S.reflect=0; S.reflectPsn=false;
  await sleep(150); S.phase="spin";
  if(S.bossRuleUsed){ S.bossRule=null; S.bossRuleUsed=false; } else if(S.bossRule) S.bossRuleUsed=true;
  render();
}

async function winStage(){
  S.phase="busy"; render(); S.stats.stagesCleared++;
  log(`<span class="good">✔ 스테이지 ${S.stage} 클리어!</span>`); await sleep(500);
  if(S.stage>=20){ gameOver(true); return; }
  S.coins+=8+S.stage*2; log(`보상: 코인 +${8+S.stage*2}`);
  const chapterCleared=CHAPTER_BOSS.includes(S.stage);
  S.stage++;
  if(chapterCleared){
    S.deck=baseDeck(S.char); S.focus=null; S.banned=[]; S.pin=null; S.bank=0;
    log(`<span class="hl">🔄 챕터 클리어 — 덱이 시작 덱으로 리셋됐다. (배지·코인·게이지·성장은 유지) 새 빌드를 시작하자!</span>`);
    await sleep(400);
  }
  openShop();
}
function gameOver(win){

      최대 한 방: <b>${st.best}</b> · 문양: <b>${st.patterns}</b> · 합체: <b>${st.merges}</b> · 운명의 손 <b>${st.fateWin}/${st.fateTry}</b>

const FOCUS_MULT=3.2;   // 집중 계열 출현 가중치 배수
function catWeight(c){ if(S&&S.banned&&S.banned.includes(c))return 0; let w=CATS[c].w; if(S&&S.focus===c)w*=FOCUS_MULT; return w; }
function rollKind(){ let ks=Object.keys(KINDS).filter(k=>KINDS[k].cat!=="curse"&&catWeight(KINDS[k].cat)>0);
  if(!ks.length) ks=Object.keys(KINDS).filter(k=>KINDS[k].cat!=="curse");
  const wt=k=>Math.max(0.0001,catWeight(KINDS[k].cat));
  const tw=ks.reduce((s,k)=>s+wt(k),0); let r=Math.random()*tw;
  for(const k of ks){ r-=wt(k); if(r<=0)return k; } return ks[0]; }
function kindOptHtml(k,extra){ const kd=KINDS[k],cat=CATS[kd.cat];
  return `<span class="em">${kd.em}</span><span><span class="tt"><span class="catdot" style="background:${cat.color}"></span>${kd.name} <small style="color:${cat.color}">${cat.name}</small></span><div class="dd">${kd.desc}</div></span>${extra||""}`; }
function openDraft(){ const nOpt=S.draft4?4:3; S.draft4=false; const opts=[...Array(nOpt)].map(()=>rollKind());
  let html=`<h2>괴담 카드 — 1장 선택</h2><div class="sub2">덱에 추가됩니다 (현재 덱 ${S.deck.length}개)</div>`;

  html+=`<div class="rowbtns"><button onclick="UI.pick(-1)">스킵 (+1 코인)</button>${S.rerollTokens>0?`<button onclick="UI.rerollDraft()">🔄 리롤 (${S.rerollTokens})</button>`:""}</div>`;
  S._draftOpts=opts; ovl(html); }
function openShop(){ if(!S._shopOffers) S._shopOffers=[...Array(4)].map(()=>rollKind());
  const pm=Math.round(0.2*(S.stage-1)*100);

  html+=`<div class="opt" onclick="UI.openBuild()"><span class="em">🎯</span><span><span class="tt">덱 빌드 — 집중 / 봉인 <small style="color:#b69ae0">확률 조작</small></span><div class="dd">${buildStatusText()}</div></span><span class="pr">🪙6 / 4</span></div>`;
  html+=`<div class="rowbtns">
    <button onclick="UI.shopReroll()">🔄 리롤 (3)</button>

function buildStatusText(){ const f=S.focus?`<span style="color:${CATS[S.focus].color}">🎯${CATS[S.focus].name}↑</span>`:"집중 없음";
  const b=S.banned.length?S.banned.map(c=>`<span style="color:#ff8a8a">🚫${CATS[c].name}</span>`).join(" "):"봉인 없음";
  return `현재: ${f} · ${b}`; }
function openBuild(){

  });
  html+=`<div class="rowbtns"><button class="primary" onclick="UI.backShop()">← 상점</button></div>`;

}
function fateMenu(){ const sunny=S.char.id==="sunny"; const top=topCategory(); const topCnt=S.deck.filter(e=>KINDS[e.k].cat===top).length;
  let html=`<h2>🖐️ 운명의 손</h2><div class="sub2">게이지를 태워 <b>다음 스핀</b>에서 최다 계열(${CATS[top].name} ${topCnt}개)을 목표 문양으로 끌어당깁니다. 확률형 — 실패 시 절반 환불 + 부분 문양.</div>`;
  FATE_TIERS.forEach((t,i)=>{ const cost=t.cost-(sunny?2:0); const ok=S.gauge>=cost&&topCnt>=t.size; const sr=topCnt>=t.size?estimateFate(t,S.deck):0;
    html+=`<div class="opt" style="${ok?"":"opacity:.4;cursor:default"}" ${ok?`onclick="UI.fate(${i})"`:""}><span class="em">${["🎯","🛡","🌌"][i]}</span><span><span class="tt">${t.name} <small>(${t.mult})</small></span><div class="dd">필요 게이지 ${cost} · 성공률 ~${sr}% · 최다 계열 ${t.size}개 필요${topCnt<t.size?` — <span style='color:#ff8a8a'>부족 (${topCnt}/${t.size})</span>`:""}</div></span></div>`; });
  html+=`<div class="rowbtns"><button onclick="UI.close()">닫기</button></div>`; ovl(html); }
async function askMoneyThrow(){ return new Promise(res=>{ const half=Math.floor(S.coins/2); if(half<=0){res();return;}
  ovl(`<h2>🪙 돈 던지기 (동전 각성)</h2><div class="sub2">보유 코인 절반(${half})을 던져 ${half} 피해.</div><div class="rowbtns"><button class="primary" id="mt1">던진다! (-${half}코인)</button><button id="mt2">아낀다</button></div>`);
  document.getElementById("mt1").onclick=()=>{ S.coins-=half; closeOvl(); dealDamage(half,false,"💸 돈 던지기"); res(); };
  document.getElementById("mt2").onclick=()=>{ closeOvl(); res(); }; }); }

const UI={
  pick(i){ if(i>=0){ S.deck.push({k:S._draftOpts[i]}); log(`덱 추가: ${KINDS[S._draftOpts[i]].name}`); } else { S.coins+=1; log("스킵 — 코인 +1"); } closeOvl(); enemyTurn(); },
  rerollDraft(){ if(S.rerollTokens>0){ S.rerollTokens--; openDraft(); } },
  buy(i){ const k=S._shopOffers[i]; const pr=priceOf(KINDS[k].cat);
    if(S.shopFree){ S.shopFree=false; } else { if(S.coins<pr){log("코인이 부족하다…");return;} S.coins-=pr; }
    S.deck.push({k}); S._shopOffers.splice(i,1); if(!S._shopOffers.length)S._shopOffers=[...Array(2)].map(()=>rollKind()); openShop(); },
  shopReroll(){ if(S.coins<3){log("코인이 부족하다…");return;} S.coins-=3; S._shopOffers=[...Array(4)].map(()=>rollKind()); S._shopBadge=null; openShop(); },
  buyBadge(){ if(!S._shopBadge)return; if(S.coins<10){log("코인이 부족하다…");return;} S.coins-=10; S.badges.push(S._shopBadge); log(`배지: ${BADGES[S._shopBadge].name}`); S._shopBadge=null; openShop(); },
  buyPin(){ if(S.coins<4){log("코인이 부족하다…");return;} S.coins-=4; S.pinTokens++; openShop(); },
  openBuild(){ openBuild(); },
  setFocus(c){ if(S.focus===c)return; if(S.coins<6){log("코인이 부족하다…");return;} S.coins-=6; if(S.banned.includes(c))S.banned=S.banned.filter(x=>x!==c); S.focus=c; log(`🎯 ${CATS[c].name} 집중! 출현율↑`); openBuild(); },
  clearFocus(){ S.focus=null; log("집중 해제"); openBuild(); },
  ban(c){ if(S.focus===c){log("집중 중인 계열은 봉인할 수 없다.");return;}
    const avail=Object.keys(CATS).filter(x=>!S.banned.includes(x)).length; if(avail<=3){log("계열을 너무 많이 봉인할 순 없다 (최소 3계열 유지).");return;}
    if(S.coins<4){log("코인이 부족하다…");return;} S.coins-=4; S.banned.push(c); log(`🚫 ${CATS[c].name} 봉인 — 풀에서 제외`); openBuild(); },
  unban(c){ S.banned=S.banned.filter(x=>x!==c); log(`${CATS[c].name} 봉인 해제`); openBuild(); },
  rest(){ if(S._rested){log("이번 정비엔 이미 쉬었다.");return;} S._rested=true; S.hp=Math.min(S.maxHp,S.hp+8); log("⛺ 휴식 — HP +8"); openShop(); },
  openDelete(){ let html=`<h2>🗑️ 심볼 삭제</h2><div class="sub2">덱에서 1개 제거 (꽝 가능)</div>`;
    S.deck.forEach((e,i)=>{ const kd=KINDS[e.k]; html+=`<div class="opt" onclick="UI.del(${i})"><span class="em">${kd.em}</span><span class="tt">${kd.name}${e.sig?" ★":""}</span></div>`; });
    html+=`<div class="rowbtns"><button onclick="UI.backShop()">← 상점</button></div>`; ovl(html); },
  del(i){ const cost=S.deck[i]&&S.deck[i].k==="nightmare"?8:5; if(S.coins<cost){log("코인이 부족하다…");return;} if(S.deck.length<=4){log("덱이 너무 작다!");return;}
    S.coins-=cost; const e=S.deck.splice(i,1)[0]; log(`삭제: ${KINDS[e.k].name} (-${cost})`); openShop(); },
  backShop(){ openShop(); },
  openCharSwap(){ let html=`<h2>🧙 출전 캐릭터</h2><div class="sub2">특성·시그니처(★)가 교체됩니다. 덱·코인·게이지 유지.</div>`;
    CHARS.forEach((c,i)=>{ html+=`<div class="opt" onclick="UI.swap(${i})"><span class="em">${["📓","🍒","⚔️","🎲"][i]}</span><span><span class="tt">${c.name} <small>(${c.team}팀)</small></span><div class="dd">${c.trait}<br>시그니처: ${c.sigName} (${KINDS[c.sig].name})</div></span></div>`; });
    html+=`<div class="rowbtns"><button onclick="UI.backShop()">← 상점</button></div>`; ovl(html); },
  swap(i){ S.char=CHARS[i]; const sigE=S.deck.find(e=>e.sig); if(sigE)sigE.k=S.char.sig; log(`출전: ${S.char.name}`); openShop(); },
  leaveShop(){ S._shopOffers=null; S._shopBadge=null; S._rested=false; closeOvl(); startStage(); },
  fate(i){ const t=FATE_TIERS[i]; const cost=t.cost-(S.char.id==="sunny"?2:0); if(S.gauge<cost)return; S.gauge-=cost; S.fatePlan={tier:{...t,cost}}; closeOvl(); log(`🖐️ 운명의 손 [${t.name}] 예약 — 다음 스핀!`); render(); },
  close(){ closeOvl(); },
  pinKind(k){ openPinCell(k); },
  pinCell(k,i){ S.pinTokens--; S.pin={k,cell:i}; closeOvl(); log(`📌 다음 스핀: ${KINDS[k].name} → ${Math.floor(i/COLS)+1}-${i%COLS+1}`); render(); },
  restart(){ closeOvl(); openCharSelect(); },
  _start(i){ closeOvl(); newRun(i); },
};
window.UI=UI;

function openCharSelect(){
  let html=`<h2>어반 로어: 운명의 거리</h2><div class="sub2">프로토타입 v0.8 — 스테이지 1~20<br>
  <b>규칙:</b> 같은 계열끼리 붙어야 발동 · 계열 일렬=문양(배수) · 같은 심볼 3개=강화, 4개=각성 · 불발은 게이지로!</div>
  <div style="font-size:13px;margin-bottom:8px;color:#fff">조사반 캐릭터를 선택하세요:</div>`;
  CHARS.forEach((c,i)=>{ html+=`<div class="opt" onclick="UI._start(${i})"><span class="em">${["📓","🍒","⚔️","🎲"][i]}</span><span><span class="tt">${c.name} <small>(${c.team}팀)</small></span><div class="dd">${c.trait}<br>시그니처: ${c.sigName} (${KINDS[c.sig].name} 계열)</div></span></div>`; });
  ovl(html);
}
function openHelp(){ ovl(`<h2>📖 규칙 요약 (v0.8)</h2>
  <div class="opt" style="cursor:default;display:block;font-size:12.5px;line-height:1.7">
  ① <b>같은 계열이 상하좌우로 붙어야 발동.</b> 다른 계열 옆=고립 불발 → 운명 게이지 +1<br>
  ② <b>문양:</b> 같은 계열 3/4/5연속 = ×1.5/×2/×3 · 결계(테두리) ×7 · 대공명(전체) ×10<br>
  ③ <b>합체:</b> 발동한 같은 심볼 — 2개 ×1.2 / 3개 ×1.5 강화 / 4개+ ×2.0 각성. 많이 모일수록 발사 이펙트도 강해진다<br>
  ④ <b>운명의 손:</b> 게이지 10/16/22로 오연·결계·대공명 도전 (확률·실패 시 절반 환불)<br>
  ⑤ <b>다수 적:</b> 공격은 맨 앞(▼) 적부터. 모두 처치하면 스테이지 클리어<br>
  ⑥ 매 턴 카드 1장, 스테이지 사이 상점(물가는 거리당 +20%) · 보스(5/10/15/20)는 괴담 규칙을 건다<br>
  ⑦ <b>덱 빌드:</b> 상점 🎯집중(한 계열 출현↑)·🚫봉인(계열 제외)으로 원하는 빌드를 노린다<br>
  ⑧ <b>챕터 리셋:</b> 챕터 보스(5·10·15)를 깨면 덱이 시작 덱으로 리셋 — 매 챕터 새 빌드 (배지·코인·게이지·성장은 유지)<br>
  ⑨ <b>저주:</b> 꽝❌ 절단 · 균열🕳️ 위력-1 · 안개🌫️ 문양무효 · 악몽😱 HP-1</div>
  <div class="rowbtns"><button class="primary" onclick="UI.close()">닫기</button></div>`); }
function openPin(){
  if(S.pinTokens<=0){ ovl(`<h2>📌 고정 토큰</h2><div class="sub2">토큰이 없다. 상점에서 4코인.</div><div class="rowbtns"><button class="primary" onclick="UI.close()">닫기</button></div>`); return; }
  if(S.pin){ ovl(`<h2>📌 고정 토큰</h2><div class="sub2">이미 ${KINDS[S.pin.k].name} 예약됨.</div><div class="rowbtns"><button class="primary" onclick="UI.close()">닫기</button></div>`); return; }
  const seen={}; let html=`<h2>📌 고정할 심볼 (토큰 ${S.pinTokens})</h2><div class="sub2">다음 스핀에서 1개를 원하는 칸에</div>`;
  S.deck.forEach(e=>{ if(seen[e.k]||KINDS[e.k].cat==="curse")return; seen[e.k]=1; html+=`<div class="opt" onclick="UI.pinKind('${e.k}')"><span class="em">${KINDS[e.k].em}</span><span class="tt">${KINDS[e.k].name}</span></div>`; });
  html+=`<div class="rowbtns"><button onclick="UI.close()">취소</button></div>`; ovl(html);
}
function openPinCell(k){ let html=`<h2>📌 ${KINDS[k].name} — 배치 칸</h2><div class="sub2">4행 × 5열</div><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px">`;
  for(let i=0;i<N;i++){ const r=Math.floor(i/COLS)+1,c=i%COLS+1; html+=`<button style="padding:12px 0;background:#27212f;border:1px solid #3a3347;border-radius:8px;color:#cfc8de;cursor:pointer" onclick="UI.pinCell('${k}',${i})">${r}-${c}</button>`; }
  html+=`</div><div class="rowbtns"><button onclick="UI.close()">취소</button></div>`; ovl(html); }
function openDeck(){ const cnt={}; S.deck.forEach(e=>{cnt[e.k]=(cnt[e.k]||0)+1;});
  let html=`<h2>🎒 내 덱 (${S.deck.length}개)</h2><div class="sub2">20개 이하 전원 등판, 초과 시 무작위 20개</div>`;
  Object.entries(cnt).forEach(([k,n])=>{ html+=`<div class="opt" style="cursor:default">${kindOptHtml(k,`<span class="pr">×${n}</span>`)}</div>`; });
  html+=`<div class="rowbtns"><button class="primary" onclick="UI.close()">닫기</button></div>`; ovl(html); }

function ovl(html){ document.getElementById("ovlBox").innerHTML=html; document.getElementById("ovl").classList.add("show"); }
function closeOvl(){ document.getElementById("ovl").classList.remove("show"); }
const LOGS=[];
function log(msg){ LOGS.push(msg); if(LOGS.length>5)LOGS.shift(); const el=document.getElementById("log"); if(el)el.innerHTML=LOGS.join("<br>"); }
function popCells(idx){ idx.forEach(i=>{ const el=document.querySelector(`[data-cell="${i}"]`); if(el){el.classList.add("pop"); setTimeout(()=>el.classList.remove("pop"),200);} }); }
function renderBoard(active,misfires,mult,pats){
  const b=document.getElementById("board"); b.innerHTML="";
  const patCells=new Set(); (pats||[]).forEach(p=>p.cells.forEach(i=>patCells.add(i)));
  for(let i=0;i<N;i++){ const d=document.createElement("div"); d.className="cell"; d.dataset.cell=i;
    const s=S?S.cells[i]:null;
    if(s){ const kd=KINDS[s.k]; const cat=CATS[kd.cat]||{color:"#5a1f1f"};
      d.innerHTML=`${kd.em}<span class="nm">${kd.name}${s.sig?"★":""}</span>`; d.style.setProperty("--c",cat.color);
      if(KINDS[s.k].cat==="curse")d.classList.add("curse");
      if(S&&S.bossRule&&S.bossRule.kind==="ban"&&kd.cat===S.bossRule.cat)d.classList.add("banned");
      if(active&&active.has(i))d.classList.add("active");
      if(active&&!active.has(i)&&KINDS[s.k].cat!=="curse")d.classList.add("misfire");
      if(patCells.has(i))d.classList.add("pattern");
    }
    b.appendChild(d); }
}
function renderDeck(){ const el=document.getElementById("deckList"); if(!el||!S)return; const cnt={};
  S.deck.forEach(e=>{cnt[e.k]=(cnt[e.k]||0)+1;}); el.innerHTML="";
  if(S.focus||S.banned.length){ const st=document.createElement("div"); st.style.cssText="flex-basis:100%;font-size:10px;color:#a89dc4;margin-bottom:3px;";
    st.innerHTML=(S.focus?`<span style="color:${CATS[S.focus].color}">🎯${CATS[S.focus].name}</span> `:"")+S.banned.map(c=>`<span style="color:#ff8a8a">🚫${CATS[c].name}</span>`).join(" "); el.appendChild(st); }
  Object.entries(cnt).forEach(([k,n])=>{ const c=document.createElement("div"); c.className="dchip"; c.title=KINDS[k].name; c.innerHTML=`${KINDS[k].em}<small>${n}</small>`; el.appendChild(c); }); }
function renderEnemies(){ const host=document.getElementById("enemies"); if(!host)return; host.innerHTML="";
  const front=frontIdx();
  S.enemies.forEach((e,i)=>{ const d=document.createElement("div"); d.className="enemy"+(e.eHp<=0?" dead":"")+(i===front?" target":""); d.dataset.enemy=i;
    const tags=[]; if(e.psn)tags.push(`☠${e.psn}`); if(e.block)tags.push(`🛡${e.block}`); if(e.atkDown)tags.push(`⬇${e.atkDown}`); if(e.stun)tags.push("💫"); if(e.seal)tags.push("⛓");
    d.innerHTML=`${i===front&&e.eHp>0?'<div class="tmark">▼</div>':''}<div class="sprite">${e.em}</div>
      <div class="unitName">${e.name}</div>
      <div class="hpbar"><div class="hpfill" style="width:${e.eHp/e.hp*100}%"></div><div class="hptext">${e.eHp}/${e.hp}</div></div>
      <div class="utags">${tags.join(" ")}</div>`;
    host.appendChild(d); });
}
function render(){ if(!S)return;
  document.getElementById("stageBadge").textContent=`STAGE ${S.stage} / 20`;
  const onBoard=k=>S.cells.filter(c=>c&&KINDS[c.k].cat===k).length;
  document.getElementById("stAtk").textContent=onBoard("atk");
  document.getElementById("stDef").textContent=onBoard("def");
  document.getElementById("stPsn").textContent=onBoard("psn");
  document.getElementById("coinTxt").textContent=S.coins;
  document.getElementById("pName").textContent=S.char.name;
  document.getElementById("pLv").textContent="Lv "+S.stage;
  document.getElementById("pBlock").textContent=S.block?`🛡️ ${S.block}`:"";
  document.getElementById("pHp").style.width=(S.hp/S.maxHp*100)+"%";
  document.getElementById("pHpT").textContent=`${S.hp} / ${S.maxHp}`;
  document.getElementById("gaugeFill").style.width=(S.gauge/22*100)+"%";
  document.getElementById("gaugeText").textContent=`운명 게이지 ${S.gauge} / 22${S.fatePlan?` — ${S.fatePlan.tier.name} 예약!`:""}`;
  document.getElementById("fateBtn").disabled=S.phase!=="spin"||S.fatePlan!==null;
  const sb=document.getElementById("spinBtn"); sb.disabled=S.phase!=="spin"; sb.textContent=S.phase==="busy"?"⏳ 정산 중…":"🎰 스핀";
  if(!document.querySelector("#board .cell")) renderBoard(null,[],null,[]);
  renderEnemies(); renderDeck();
}
document.getElementById("spinBtn").onclick=()=>doSpin();
document.getElementById("fateBtn").onclick=()=>{ if(S.phase==="spin"&&!S.fatePlan) fateMenu(); };
document.getElementById("icHelp").onclick=()=>{ if(S&&S.phase!=="over") openHelp(); };
document.getElementById("icDeck").onclick=()=>{ if(S&&S.phase==="spin") openDeck(); };
document.getElementById("icChar").onclick=()=>{ if(S&&S.phase==="spin"){ const c=S.char; ovl(`<h2>🧙 ${c.name} (${c.team}팀)</h2><div class="sub2">${c.trait}<br>시그니처: ${c.sigName}</div><div class="rowbtns"><button class="primary" onclick="UI.close()">닫기</button></div>`); } };
document.getElementById("coinBtn").onclick=()=>{ if(S&&S.phase==="spin") openPin(); };
document.getElementById("skipBtn").onclick=()=>{ window.__FAST=!window.__FAST; document.getElementById("skipBtn").style.opacity=window.__FAST?"0.5":"1"; };
document.getElementById("menuBtn").onclick=()=>openHelp();
renderBoard(null,[],null,[]);
openCharSelect();
if(typeof window!=="undefined"){ window.__hook={ get S(){return S;}, doSpin, enemyTurn, openShop, openDraft, fateMenu }; }
</script>
</body>
