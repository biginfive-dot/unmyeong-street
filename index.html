<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>어반 로어: 운명의 거리 — 프로토타입 v0.4</title>
<style>
:root { color-scheme: light; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#edeae4; font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; display:flex; justify-content:center; padding:10px; }
#app { width:100%; max-width:520px; background:#17151c; color:#e8e4da; border-radius:16px; padding:12px; box-shadow:0 8px 40px rgba(0,0,0,.35); position:relative; overflow:hidden; }
.bar { display:flex; justify-content:space-between; align-items:center; gap:8px; font-size:13px; }
#topbar { padding:4px 2px 8px; border-bottom:1px solid #2c2836; }
#topbar .stage { color:#b7aed0; font-weight:bold; }
.pill { background:#241f2e; border:1px solid #3a3347; border-radius:20px; padding:3px 10px; font-size:12px; white-space:nowrap; }
.pill b { color:#ffd36b; }
#charBtn { cursor:pointer; }
/* enemy */
#enemy { margin:10px 0 6px; background:#1f1a28; border:1px solid #3a3347; border-radius:12px; padding:10px; }
#enemy .name { font-weight:bold; font-size:15px; }
#enemy .intent { font-size:12px; color:#f0b9b9; margin-top:3px; }
#enemy .tags { font-size:11px; color:#b69ae0; margin-top:2px; min-height:14px; }
.hpwrap { background:#0e0c12; border-radius:8px; height:16px; margin-top:6px; overflow:hidden; position:relative; }
.hpfill { height:100%; background:linear-gradient(90deg,#c0392b,#e74c3c); transition:width .35s; }
.hpfill.player { background:linear-gradient(90deg,#1e8e54,#2ecc71); }
.hptext { position:absolute; inset:0; text-align:center; font-size:11px; line-height:16px; color:#fff; text-shadow:0 1px 2px #000; }
/* board */
#board { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin:10px 0; }
.cell { aspect-ratio:1; background:#221d2c; border:2px solid #332c40; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:22px; position:relative; transition:transform .15s, box-shadow .2s, opacity .2s, border-color .2s; }
.cell .nm { font-size:8.5px; color:#9b93ad; line-height:1; margin-top:1px; }
.cell.active { border-color:var(--c,#7c6bb0); box-shadow:0 0 8px var(--c,#7c6bb0); }
.cell.misfire { opacity:.28; filter:grayscale(.8); }
.cell.pattern { border-color:#ffd36b !important; box-shadow:0 0 12px #ffd36bcc; }
.cell.pop { transform:scale(1.18); }
.cell.curse { border-color:#5a1f1f; background:#241313; }
.cell.banned { opacity:.25; border-color:#5a1f1f; }
/* fate */
#fate { display:flex; align-items:center; gap:8px; margin:4px 0 8px; }
#gaugeWrap { flex:1; background:#0e0c12; height:18px; border-radius:9px; overflow:hidden; position:relative; }
#gaugeFill { height:100%; width:0%; background:linear-gradient(90deg,#7ea84a,#b6e063); transition:width .3s; }
#gaugeText { position:absolute; inset:0; font-size:11px; text-align:center; line-height:18px; color:#fff; text-shadow:0 1px 2px #000; }
#fateBtn { background:#3c3550; border:1px solid #6b5fa0; color:#e8e4da; border-radius:10px; padding:7px 10px; font-size:12px; cursor:pointer; white-space:nowrap; }
#fateBtn:disabled { opacity:.4; cursor:default; }
/* controls */
#controls { display:flex; gap:8px; }
button.big { flex:1; background:linear-gradient(180deg,#8a2f3c,#6e2430); color:#fff; border:1px solid #b0506000; border-radius:12px; padding:13px 0; font-size:17px; font-weight:bold; cursor:pointer; font-family:inherit; }
button.big:disabled { opacity:.45; cursor:default; }
button.sub { background:#241f2e; color:#cfc8de; border:1px solid #3a3347; border-radius:12px; padding:0 14px; font-size:13px; cursor:pointer; font-family:inherit; }
#log { margin-top:8px; font-size:12px; line-height:1.55; color:#bdb5cc; min-height:74px; max-height:74px; overflow:hidden; }
#log .hl { color:#ffd36b; }
#log .dmg { color:#ff8a8a; }
#log .good { color:#9fe08a; }
/* overlay */
#ovl { position:absolute; inset:0; background:rgba(10,8,14,.9); display:none; align-items:center; justify-content:center; padding:16px; z-index:10; }
#ovl.show { display:flex; }
#ovlBox { background:#1f1a28; border:1px solid #4a4060; border-radius:14px; padding:16px; width:100%; max-height:96%; overflow-y:auto; }
#ovlBox h2 { font-size:17px; margin-bottom:4px; color:#fff; }
#ovlBox .sub2 { font-size:12px; color:#a89dc4; margin-bottom:12px; }
.opt { background:#27212f; border:1px solid #3a3347; border-radius:10px; padding:10px; margin-bottom:8px; cursor:pointer; display:flex; gap:10px; align-items:center; }
.opt:hover { border-color:#7c6bb0; }
.opt .em { font-size:26px; }
.opt .tt { font-size:14px; font-weight:bold; }
.opt .dd { font-size:11.5px; color:#a89dc4; line-height:1.4; }
.opt .pr { margin-left:auto; font-size:13px; color:#ffd36b; white-space:nowrap; }
.rowbtns { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
.rowbtns button { flex:1; background:#241f2e; border:1px solid #3a3347; color:#e8e4da; border-radius:10px; padding:10px; font-size:13px; cursor:pointer; font-family:inherit; min-width:90px; }
.rowbtns button.primary { background:#6e2430; border-color:#8a2f3c; font-weight:bold; }
.catdot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:4px; }
.shake { animation:shk .35s; }
@keyframes shk { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }
.floatdmg { position:absolute; font-weight:bold; font-size:20px; pointer-events:none; animation:fl 0.9s forwards; z-index:5; text-shadow:0 2px 4px #000; }
@keyframes fl { 0%{opacity:1; transform:translateY(0)} 100%{opacity:0; transform:translateY(-44px)} }
small.ver { display:block; text-align:center; color:#564e68; font-size:10px; margin-top:8px; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar" class="bar">
    <span class="stage" id="stageTxt">거리 1 — 전투 1/4</span>
    <span class="pill" id="charBtn">👤 <b id="charName">-</b></span>
    <span class="pill">🪙 <b id="coinTxt">0</b></span>
  </div>
  <div id="enemy">
    <div class="bar"><span class="name" id="eName">-</span><span class="pill" id="eIntent2" style="display:none"></span></div>
    <div class="intent" id="eIntent">다음 행동: -</div>
    <div class="tags" id="eTags"></div>
    <div class="hpwrap"><div class="hpfill" id="eHp"></div><div class="hptext" id="eHpT"></div></div>
  </div>
  <div class="bar" style="margin-top:2px"><span style="font-size:12px;color:#9fe08a">나 (조사반)</span><span class="pill" id="blockTxt" style="display:none">🛡️ 0</span></div>
  <div class="hpwrap" style="margin-top:4px"><div class="hpfill player" id="pHp"></div><div class="hptext" id="pHpT"></div></div>
  <div id="board"></div>
  <div id="fate">
    <div id="gaugeWrap"><div id="gaugeFill"></div><div id="gaugeText">운명 게이지 0 / 22</div></div>
    <button id="fateBtn">🖐️ 운명의 손</button>
  </div>
  <div id="controls">
    <button class="big" id="spinBtn">🎰 스핀</button>
    <button class="sub" id="pinBtn">📌</button>
    <button class="sub" id="deckBtn">덱</button>
    <button class="sub" id="helpBtn">?</button>
  </div>
  <div id="log"></div>
  <small class="ver">어반 로어: 운명의 거리 — 코어 프로토타입 v0.4 (기획서 v3.2 기준) · BIGINFIVE</small>
  <div id="ovl"><div id="ovlBox"></div></div>
</div>
<script>
"use strict";
/* ============ 데이터 ============ */
const CATS = {
  atk:  { name:"공격", color:"#e5484d", w:1.3, price:3 },
  def:  { name:"방어", color:"#4f8df0", w:1.3, price:3 },
  heal: { name:"회복", color:"#2ecc71", w:1.0, price:4 },
  psn:  { name:"독",   color:"#a855f7", w:1.0, price:4 },
  coin: { name:"코인", color:"#eab308", w:0.8, price:5 },
  luck: { name:"행운", color:"#9acd32", w:0.8, price:5 },
  ghost:{ name:"괴담", color:"#8d8d99", w:0.5, price:7 },
};
const KINDS = {
  sword:  { cat:"atk",  name:"검",     em:"⚔️", pow:2, desc:"공격 2 · 강화: +3 · 각성: 이번 턴 모든 공격 +2" },
  gun:    { cat:"atk",  name:"총",     em:"🔫", pow:2, desc:"공격 1×2연발 · 강화: 3연발 · 각성: 15% 기절" },
  bow:    { cat:"atk",  name:"활",     em:"🏹", pow:1, desc:"공격 1, 적 방어 무시 · 강화: +2 · 각성: +4" },
  shield: { cat:"def",  name:"방패",   em:"🛡️", pow:2, desc:"방어 2 · 강화: +3 · 각성: 남은 방어 이월" },
  helmet: { cat:"def",  name:"헬멧",   em:"🪖", pow:1, desc:"방어 1 · 강화: +2 · 각성: 회복 2" },
  thorn:  { cat:"def",  name:"가시방패",em:"🦔", pow:1, desc:"방어 1, 막은 피해 반사 · 강화: 반사 2배 · 각성: +독 1" },
  cherry: { cat:"heal", name:"체리",   em:"🍒", pow:2, desc:"회복 2 · 강화: +3 · 각성: 최대 HP +1" },
  herb:   { cat:"heal", name:"약초",   em:"🌿", pow:1, desc:"회복 1 · 강화: 덱의 꽝 1개 정화 · 각성: 정화당 공격 2" },
  bento:  { cat:"heal", name:"도시락", em:"🍱", pow:1, desc:"회복 1+코인 1 · 강화: 코인 +2 · 각성: 다음 드래프트 4택" },
  poison: { cat:"psn",  name:"독병",   em:"🧪", pow:2, desc:"독 +2 · 강화: +4 · 각성: 이번 턴 독 유지" },
  spike:  { cat:"psn",  name:"가시",   em:"🌵", pow:1, desc:"공격 1 + 독 1 · 강화: 각 +1 · 각성: 독 스택만큼 즉시 피해" },
  spider: { cat:"psn",  name:"거미",   em:"🕷️", pow:1, desc:"독 +1, 중독 적이면 +2 · 강화: +3 · 각성: 30% 기절" },
  coin1:  { cat:"coin", name:"동전",   em:"🪙", pow:2, desc:"코인 2 · 강화: +3 · 각성: 돈 던지기(보유 절반 소모=피해)" },
  bill:   { cat:"coin", name:"지폐",   em:"💵", pow:3, desc:"코인 3 · 강화: +5 · 각성: 상점 1회 무료" },
  piggy:  { cat:"coin", name:"저금통", em:"🐷", pow:1, desc:"코인 1 적립 · 강화: 적립 ×2 지급 · 각성: ×3" },
  clover: { cat:"luck", name:"클로버", em:"🍀", pow:1, desc:"게이지 +1 · 강화: +3 · 각성: +5" },
  dice:   { cat:"luck", name:"주사위", em:"🎲", pow:2, desc:"공·방·회 중 무작위 2 · 강화: 4 · 각성: 셋 다 3" },
  candy:  { cat:"luck", name:"별사탕", em:"🍬", pow:1, desc:"회복 1 + 게이지 1 · 강화: 코인 +2 · 각성: 리롤 토큰 +1" },
  note:   { cat:"ghost",name:"괴담노트",em:"📓", pow:3, desc:"공격 3 · 강화: +4, 적 공격 -1 · 각성: 적 다음 행동 봉인" },
  doppel: { cat:"ghost",name:"도플갱어",em:"👥", pow:1, desc:"인접 심볼의 종류로 변해 합체에 가담" },
  clock:  { cat:"ghost",name:"시계태엽",em:"⚙️", pow:1, desc:"이번 턴 최대 문양 1개 재정산 · 강화: 2개" },
  curse:  { cat:"curse",name:"꽝",     em:"❌", pow:0, desc:"발동 없음. 이웃으로 인정 안 됨 (연결 절단)" },
  crack:  { cat:"curse",name:"균열",   em:"🕳️", pow:0, desc:"모든 계열의 이웃으로 인정되지만, 인접 심볼 위력 -1 (독이 든 이웃)" },
  fog:    { cat:"curse",name:"검은 안개",em:"🌫️", pow:0, desc:"자기 칸+상하좌우의 문양 판정 무효 · 매 턴 30%로 덱에 번짐" },
  nightmare:{ cat:"curse",name:"악몽", em:"😱", pow:0, desc:"보드에 등장할 때마다 내 HP -1 · 삭제비 8코인" },
};
const BADGES = {
  amulet:   { name:"운세 부적",   em:"🧿", desc:"매 턴 운명 게이지 +1" },
  compass:  { name:"괴담 나침반", em:"🧭", desc:"매 턴 최다 계열 2개가 반드시 붙어서 배치" },
  whetstone:{ name:"숫돌",       em:"🪨", desc:"공격 계열 심볼 위력 +1" },
  aidkit:   { name:"구급 가방",   em:"⛑️", desc:"회복 계열 심볼 위력 +1" },
};
const CHARS = [
  { id:"luka", name:"루카", team:"괴담", sig:"note",  sigName:"괴담 수첩",
    trait:"괴담 계열은 고립이어도 발동" },
  { id:"tava", name:"타바레스", team:"회복", sig:"cherry", sigName:"약병",
    trait:"과회복 전환 100% (기본 50%)" },
  { id:"good", name:"굿맨", team:"공격", sig:"sword", sigName:"식칼",
    trait:"합체(2개+) 발동마다 그 위력 +1" },
  { id:"sunny",name:"써니", team:"행운", sig:"dice",  sigName:"물음표 상자",
    trait:"운명의 손 필요 게이지 -2 (8/14/20)" },
];
const ENEMIES = [
  { name:"도시 쥐떼 🐀", hp:12, pat:[ {t:"atk",v:4,txt:"공격 4"}, {t:"atk",v:4,txt:"공격 4"}, {t:"heal",v:4,txt:"무리 불리기 (HP+4)"} ] },
  { name:"덩굴 인형 🪆", hp:20, pat:[ {t:"atk",v:7,txt:"공격 7"}, {t:"curse",txt:"꽝 끼워넣기 ❌"} ] },
  { name:"그림자 들개 🐕", hp:32, pat:[ {t:"atk",v:5,txt:"공격 5"}, {t:"atk",v:8,txt:"공격 8"}, {t:"block",v:4,txt:"웅크림 (보호막 4)"} ] },
  { name:"풀려난 악마 '시리우스' 😈", hp:120, boss:true,
    pat:[ {t:"atk",v:7,txt:"공격 7"}, {t:"rule",txt:"괴담 규칙: 쪽지 붙이기"}, {t:"atk",v:9,txt:"공격 9"}, {t:"curse",txt:"꽝 끼워넣기 ❌"} ] },
];
const RUN_PATTERNS = { 3:{mult:1.5,name:"삼연"}, 4:{mult:2,name:"사연"}, 5:{mult:3,name:"오연"} };
const FATE_TIERS = [
  { name:"오연",   shape:"row",  size:5,  cost:10, q:0.90, mult:"×3" },
  { name:"결계",   shape:"ring", size:14, cost:16, q:0.94, mult:"×7" },
  { name:"대공명", shape:"all",  size:20, cost:22, q:0.94, mult:"×10" },
];
const ROWS=4, COLS=5, N=20;

/* ============ 상태 ============ */
let S = null;
function newRun(charIdx){
  const ch = CHARS[charIdx];
  S = {
    char: ch, hp:30, maxHp:30, block:0, carryBlock:false, coins:10, gauge:0,
    deck: ["sword","sword","shield","shield","cherry","cherry","clover", ch.sig].map(k=>({k, sig:k===ch.sig})),
    battle:0, enemy:null, eHp:0, eBlock:0, ePsn:0, eStun:false, eSeal:false, eAtkDown:0, eIdx:0,
    bank:0, rerollTokens:0, shopFree:false, draft4:false, fatePlan:null, bannedCat:null, bossRule:null, badges:[], pinTokens:1, pin:null, turn:0,
    stats:{turns:0,dmg:0,best:0,patterns:0,fateTry:0,fateWin:0,merges:0},
    cells:[], phase:"spin",
  };
  startBattle();
}
function startBattle(){
  const e = ENEMIES[S.battle];
  S.enemy = e; S.eHp = e.hp; S.eBlock=0; S.ePsn=0; S.eStun=false; S.eSeal=false; S.eAtkDown=0; S.eIdx=0;
  S.block=0; S.bannedCat=null; S.bossRule=null; S.bossRuleUsed=false; S.turn=0; S.phase="spin"; S.cells = Array(N).fill(null);
  renderBoard(null,[],null,[]);
  log(`<span class="hl">⚔ ${e.name}</span> 이(가) 나타났다!`);
  render();
}

/* ============ 핵심 규칙 (순수 로직) ============ */
function neighbors(i){ const r=Math.floor(i/COLS), c=i%COLS, out=[];
  if(r>0)out.push(i-COLS); if(r<ROWS-1)out.push(i+COLS); if(c>0)out.push(i-1); if(c<COLS-1)out.push(i+1); return out; }
function lines(){ // 모든 직선 (가로/세로/대각) — 대각은 diag 표식
  const L=[];
  for(let r=0;r<ROWS;r++){ const a=[...Array(COLS)].map((_,c)=>r*COLS+c); a.diag=false; L.push(a); }
  for(let c=0;c<COLS;c++){ const a=[...Array(ROWS)].map((_,r)=>r*COLS+c); a.diag=false; L.push(a); }
  for(let s=-ROWS;s<=COLS;s++){ const d=[]; for(let r=0;r<ROWS;r++){const c=s+r; if(c>=0&&c<COLS)d.push(r*COLS+c);} if(d.length>=3){d.diag=true; L.push(d);} }
  for(let s=0;s<COLS+ROWS;s++){ const d=[]; for(let r=0;r<ROWS;r++){const c=s-r; if(c>=0&&c<COLS)d.push(r*COLS+c);} if(d.length>=3){d.diag=true; L.push(d);} }
  return L;
}
const PERIM = [...Array(N).keys()].filter(i=>{const r=Math.floor(i/COLS),c=i%COLS; return r===0||r===ROWS-1||c===0||c===COLS-1;});
function detectPatterns(cells){
  const mult=Array(N).fill(1), pats=[];
  // 검은 안개: 십자 범위 문양 판정 무효
  const blocked=new Set();
  for(let i=0;i<N;i++) if(cells[i]&&cells[i].k==="fog"){ blocked.add(i); neighbors(i).forEach(j=>blocked.add(j)); }
  const cat = i => (!blocked.has(i) && cells[i] && KINDS[cells[i].k].cat!=="curse") ? KINDS[cells[i].k].cat : null;
  const addPat=(name,c,m,cs)=>{ pats.push({name,cat:c,mult:m,cells:cs}); cs.forEach(i=>mult[i]=Math.max(mult[i],m)); };
  // 대공명 (×10) — 내부 문양 동시 정산을 위해 계속 탐지 진행
  const c0=cat(0);
  const grand = !!(c0 && [...Array(N).keys()].every(i=>cat(i)===c0));
  if(grand) addPat("대공명",c0,10,[...Array(N).keys()]);
  // 결계 (테두리 14칸, ×7)
  const pc=cat(PERIM[0]);
  if(pc && PERIM.every(i=>cat(i)===pc)) addPat("결계",pc,7,[...PERIM]);
  // 산/골 (5칸·3행 V자, ×5)
  for(let r=0;r+2<ROWS;r++){
    const mtn=[(r+2)*COLS+0,(r+1)*COLS+1,r*COLS+2,(r+1)*COLS+3,(r+2)*COLS+4];
    const val=[r*COLS+0,(r+1)*COLS+1,(r+2)*COLS+2,(r+1)*COLS+3,r*COLS+4];
    for(const [nm,cs] of [["산",mtn],["골",val]]){ const c=cat(cs[0]); if(c && cs.every(i=>cat(i)===c)) addPat(nm,c,5,cs); }
  }
  // 번개 (5칸 지그재그·2행, ×4)
  for(let r=0;r+1<ROWS;r++){
    const zig=[r*COLS+0,(r+1)*COLS+1,r*COLS+2,(r+1)*COLS+3,r*COLS+4];
    const zag=[(r+1)*COLS+0,r*COLS+1,(r+1)*COLS+2,r*COLS+3,(r+1)*COLS+4];
    for(const cs of [zig,zag]){ const c=cat(cs[0]); if(c && cs.every(i=>cat(i)===c)) addPat("번개",c,4,cs); }
  }
  // 직선 연속 (삼연 ×1.5 / 사연 ×2 / 오연 ×3) — '떨어져!' 규칙 시 대각 제외
  for(const line of lines()){
    if(line.diag && S && S.bossRule && S.bossRule.kind==="noDiag") continue;
    let s=0;
    while(s<line.length){
      const c=cat(line[s]);
      if(!c){s++; continue;}
      let e=s; while(e+1<line.length && cat(line[e+1])===c) e++;
      const len=e-s+1;
      if(len>=3){ const def=RUN_PATTERNS[Math.min(len,5)];
        addPat(def.name,c,def.mult,line.slice(s,e+1));
      }
      s=e+1;
    }
  }
  // 포함 규칙: 더 큰 문양에 완전히 포함된 문양은 미정산 (대공명만 예외 — 내부 동시 정산)
  const kept=pats.filter((p,pi)=> p.name==="대공명" || !pats.some((q,qi)=> qi!==pi && q.name!=="대공명" && q.cells.length>p.cells.length && p.cells.every(c2=>q.cells.includes(c2))));
  return {mult,pats:kept,grand};
}
function getActive(cells, mult, pats){
  const inPat = new Set(); pats.forEach(p=>p.cells.forEach(i=>inPat.add(i)));
  const active=new Set(), misfires=[];
  for(let i=0;i<N;i++){
    const s=cells[i]; if(!s||KINDS[s.k].cat==="curse") continue;
    const kcat = KINDS[s.k].cat;
    if(S.bossRule && S.bossRule.kind==="ban" && kcat===S.bossRule.cat){ misfires.push(i); continue; }
    const hasNb = neighbors(i).some(j=>{
      const nb=cells[j]; if(!nb) return false;
      if(nb.k==="crack") return true;                              // 균열: 연결시켜 주는 미끼
      if(KINDS[nb.k].cat==="curse") return false;
      if(s.k==="doppel" || nb.k==="doppel") return true;           // 도플갱어: 만능 연결
      return KINDS[nb.k].cat===kcat;                               // 같은 계열만 이웃 인정
    });
    const lukaPass = S.char.id==="luka" && kcat==="ghost";
    if(hasNb || inPat.has(i) || lukaPass) active.add(i); else misfires.push(i);
  }
  return {active,misfires};
}
function coefOf(n){ return n>=5?2.5 : n===4?2 : n===3?1.5 : n===2?1.2 : 1; }
function tierOf(n){ return n>=4?2 : n===3?1 : 0; } // 0일반 1강화 2각성

/* ============ 스핀 & 정산 ============ */
const sleep = ms => new Promise(r=>setTimeout(r, (typeof window!=="undefined"&&window.__FAST)?0:ms));
function pickCells(k){ const free=[...Array(N).keys()].filter(i=>!S.cells[i]); return free.length?free.splice(Math.floor(Math.random()*free.length),1)[0]:-1; }
function topCatOf(deck){
  const cnt={}; deck.forEach(e=>{const c=KINDS[e.k].cat; if(c!=="curse")cnt[c]=(cnt[c]||0)+1;});
  const ent=Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
  return ent.length?ent[0][0]:"atk";
}
function fateArrange(deck, tier){
  const cells=Array(N).fill(null);
  const topCat=topCatOf(deck);
  const target = tier.shape==="row" ? (()=>{const r=Math.floor(Math.random()*ROWS); return [...Array(COLS)].map((_,c)=>r*COLS+c);})()
              : tier.shape==="ring" ? [...PERIM] : [...Array(N).keys()];
  const tops=shuffle(deck.filter(e=>KINDS[e.k].cat===topCat));
  const others=shuffle(deck.filter(e=>KINDS[e.k].cat!==topCat));
  let ti=0;
  for(const c of shuffle([...target])){           // 목표 칸마다 타격률 q로 최다 계열 안착
    if(ti<tops.length && Math.random()<tier.q){ cells[c]=tops[ti++]; }
  }
  const rest=shuffle([...tops.slice(ti),...others]); // 나머지(빗나간 칸 포함)는 일반 추첨
  for(const e of rest){
    const free=[...Array(N).keys()].filter(i=>!cells[i]);
    if(!free.length || cells.filter(Boolean).length>=N) break;
    cells[free[Math.floor(Math.random()*free.length)]]=e;
  }
  const success=target.every(i=>cells[i] && KINDS[cells[i].k].cat===topCat);
  return {cells,success,topCat};
}
function estimateFate(tier, deck){
  let w=0; const T=250;
  for(let t=0;t<T;t++){ if(fateArrange(deck,tier).success) w++; }
  return Math.max(1,Math.min(99,Math.round(w/T*100)));
}
function placeBoard(){
  S.cells = Array(N).fill(null);
  if(S.fatePlan){
    const r=fateArrange(S.deck, S.fatePlan.tier);
    S.cells=r.cells; S.fateResult={success:r.success, tier:S.fatePlan.tier};
  } else {
    let pool=shuffle([...S.deck]).slice(0,N);
    if(S.pin){ const pi=pool.findIndex(e=>e.k===S.pin.k);
      if(pi>=0 && !S.cells[S.pin.cell]){ S.cells[S.pin.cell]=pool.splice(pi,1)[0]; log(`📌 ${KINDS[S.pin.k].name} 고정 배치!`); }
      S.pin=null; }
    if(S.badges.includes("compass")){ // 최다 계열 2개 인접 보장
      const tc=topCategory(); const tops=[];
      for(let i2=pool.length-1;i2>=0&&tops.length<2;i2--){ if(KINDS[pool[i2].k].cat===tc) tops.push(pool.splice(i2,1)[0]); }
      if(tops.length===2){ const free=freeCells(); const a=free[Math.floor(Math.random()*free.length)];
        const nbs=neighbors(a).filter(j=>!S.cells[j]);
        if(nbs.length){ S.cells[a]=tops[0]; S.cells[nbs[Math.floor(Math.random()*nbs.length)]]=tops[1]; }
        else pool.push(...tops); }
      else pool.push(...tops);
    }
    for(const e of pool){ const f=freeCells(); if(!f.length)break; S.cells[f[Math.floor(Math.random()*f.length)]]=e; }
    S.fateResult=null;
  }
}
function freeCells(){ return [...Array(N).keys()].filter(i=>!S.cells[i]); }
function countPlaced(){ return S.cells.filter(Boolean).length; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }
function topCategory(){
  const cnt={}; S.deck.forEach(e=>{const c=KINDS[e.k].cat; if(c!=="curse")cnt[c]=(cnt[c]||0)+1;});
  return Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0][0];
}

async function doSpin(){
  if(S.phase==="busy" && !document.getElementById("ovl").classList.contains("show") && S.busyAt && Date.now()-S.busyAt>4000){
    S.phase="spin"; log("⚠️ 흐름 복구"); render(); return;
  }
  if(S.phase!=="spin") return;
  S.busyAt=Date.now();
  S.phase="busy"; S.turn++; S.stats.turns++;
  if(!S.carryBlock) S.block=0; S.carryBlock=false;
  placeBoard(); render();
  renderBoard(null,[],null,[]);
  await sleep(420);
  // 운명의 손 결과 판정
  if(S.fateResult){
    S.stats.fateTry++;
    if(S.fateResult.success){ S.stats.fateWin++; log(`<span class="good">🖐️ 운명의 손 — ${S.fateResult.tier.name} 성공!</span>`); }
    else { const refund=Math.ceil(S.fateResult.tier.cost/2); S.gauge=Math.min(22,S.gauge+refund);
      log(`🖐️ 운명의 손 — ${S.fateResult.tier.name} 실패… 게이지 ${refund} 환불`); }
    S.fatePlan=null;
  }
  const {mult,pats,grand}=detectPatterns(S.cells);
  S.grandEcho = grand ? pats.filter(p=>p.name!=="대공명") : null;
  const {active,misfires}=getActive(S.cells,mult,pats);
  S.stats.patterns+=pats.length;
  // 시각 표시
  renderBoard(active,misfires,mult,pats);
  if(pats.length) log(`<span class="hl">✦ 문양: ${pats.map(p=>p.name+"("+CATS[p.cat].name+")").join(", ")}</span>`);
  const nmCount=S.cells.filter(c=>c&&c.k==="nightmare").length;
  if(nmCount){ S.hp=Math.max(0,S.hp-nmCount); log(`😱 악몽 — HP -${nmCount}`); if(S.hp<=0){ gameOver(false); return; } }
  if(S.cells.some(c=>c&&c.k==="fog") && S.deck.filter(e=>e.k==="fog").length<2 && Math.random()<0.3){
    S.deck.push({k:"fog"}); log("🌫️ 안개가 덱으로 번졌다…"); }
  if(misfires.length){ const gain=Math.min(2,misfires.length);
    S.gauge=Math.min(22,S.gauge+gain); log(`불발 ${misfires.length}개 → 게이지 +${gain}${misfires.length>2?" (턴당 최대 2)":""}`); }
  if(S.badges && S.badges.includes("amulet")){ S.gauge=Math.min(22,S.gauge+1); log("🧿 운세 부적 — 게이지 +1"); }
  await sleep(550);
  await resolve(active,mult,pats);
  if(S.grandEcho && S.grandEcho.length && S.eHp>0){
    for(const p2 of S.grandEcho){ const v=Math.round(p2.cells.reduce((s2,i)=>S.cells[i]?s2+KINDS[S.cells[i].k].pow*p2.mult:s2,0));
      if(v>0){ applyCatValue(p2.cat,v); log(`🌌 대공명 공명 — ${p2.name} 동시 정산 +${v}`); await sleep(150);} }
    S.grandEcho=null;
  }
  if(S.eHp<=0){ await winBattle(); return; }
  await sleep(700);
  // 드래프트
  S.phase="draft"; render(); openDraft();
}

async function resolve(active, mult, pats){
  // 도플갱어 변신
  const eff = {};
  for(const i of active){
    const k=S.cells[i].k;
    if(k!=="doppel"){ eff[i]=k; continue; }
    const counts={};
    neighbors(i).forEach(j=>{ if(active.has(j)&&S.cells[j].k!=="doppel"&&S.cells[j].k!=="curse"){ counts[S.cells[j].k]=(counts[S.cells[j].k]||0)+1; } });
    const best=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
    eff[i]= best? best[0] : "doppel";
  }
  // 합체 그룹
  const groups={};
  for(const i of active){ const k=eff[i]; (groups[k]=groups[k]||[]).push(i); }
  // 정산 순서: 방어 → 회복/행운/코인 → 독 → 공격 → 괴담
  const order=["def","heal","luck","coin","psn","atk","ghost"];
  let turnAtkBonus=0, overheal=0, pendingThrow=false;
  const gk = Object.keys(groups).sort((a,b)=> order.indexOf(KINDS[a]?KINDS[a].cat:"ghost") - order.indexOf(KINDS[b]?KINDS[b].cat:"ghost"));
  for(const k of gk){
    if(k==="doppel") continue;
    const cellsIdx=groups[k], kind=KINDS[k], n=cellsIdx.length;
    const scatter = S.bossRule && S.bossRule.kind==="noMerge";
    const coef = scatter?1:coefOf(n), tier = scatter?0:tierOf(n);
    const badgePow = (S.badges.includes("whetstone")&&kind.cat==="atk"?1:0) + (S.badges.includes("aidkit")&&kind.cat==="heal"?1:0);
    let total = cellsIdx.reduce((s,i)=>{
      let pw = kind.pow + badgePow;
      if(neighbors(i).some(j=>S.cells[j]&&S.cells[j].k==="crack")) pw=Math.max(0,pw-1);   // 균열 페널티
      return s + pw*mult[i];
    },0)*coef;
    if(S.char.id==="good" && n>=2) total+=1;
    total=Math.round(total);
    if(n>=2) S.stats.merges++;
    popCells(cellsIdx);
    const tierTxt = tier===2?" [각성]":tier===1?" [강화]":"";
    switch(kind.cat){
      case "atk": {
        let dmg=total;
        if(k==="sword"){ if(tier>=1)dmg+=3; if(tier===2)turnAtkBonus+=2; }
        if(k==="gun"){ if(tier>=1)dmg+=n; if(tier===2&&Math.random()<0.15*n){S.eStun=true; log("💫 적 기절!");} }
        if(k==="bow"){ if(tier>=1)dmg+=2; if(tier===2)dmg+=2; }
        dmg+=turnAtkBonus;
        dealDamage(dmg, k==="bow", `${kind.em}${kind.name}×${n}${tierTxt}`);
        break; }
      case "def": {
        let b=total;
        if(k==="shield"){ if(tier>=1)b+=3; if(tier===2)S.carryBlock=true; }
        if(k==="helmet"){ if(tier>=1)b+=2; if(tier===2)healP(2); }
        if(k==="thorn"){ S.reflect=(tier>=1?2:1); if(tier===2)S.reflectPsn=true; }
        S.block+=b; log(`${kind.em}${kind.name}×${n}${tierTxt} → 방어 +${b}`);
        break; }
      case "heal": {
        let h=total, extraCoin=0;
        if(k==="cherry"){ if(tier>=1)h+=3; if(tier===2){S.maxHp+=1; log("💗 최대 HP +1");} }
        if(k==="herb"&&tier>=1){ const ci=S.deck.findIndex(e=>e.k==="curse");
          if(ci>=0){S.deck.splice(ci,1); log("🌿 덱의 꽝 1개 정화!"); if(tier===2)dealDamage(2,false,"정화의 빛");} }
        if(k==="bento"){ extraCoin=n*1+(tier>=1?2:0); if(tier===2)S.draft4=true; }
        if(extraCoin){S.coins+=extraCoin; log(`🍱 코인 +${extraCoin}`);}
        const room=S.maxHp-S.hp;
        if(h>room){ const over=h-room; const conv=Math.round(over*(S.char.id==="tava"?1:0.5)); if(conv>0){overheal+=conv; log(`과회복 ${over} → 전환 피해 +${conv}`);} }
        healP(h); log(`${kind.em}${kind.name}×${n}${tierTxt} → 회복`);
        break; }
      case "psn": {
        if(k==="poison"){ let p2=total; if(tier>=1)p2+=4; if(tier===2)S.psnHold=true; addPsn(p2); }
        if(k==="spike"){ let d=total, p2=n; if(tier>=1){d+=1;p2+=1;} addPsn(p2); dealDamage(d,false,`${kind.em}가시×${n}${tierTxt}`);
          if(tier===2&&S.ePsn>0)dealDamage(S.ePsn,true,"독 폭발"); }
        if(k==="spider"){ let p2=n*(S.ePsn>0?3:1); if(tier>=1)p2+=3; addPsn(p2);
          if(tier===2&&Math.random()<0.3){S.eStun=true; log("💫 거미줄 — 적 기절!");} }
        log(`${kind.em}${kind.name}×${n}${tierTxt} 발동`);
        break; }
      case "coin": {
        if(k==="coin1"){ let c=total; if(tier>=1)c+=3; S.coins+=c; log(`🪙 동전×${n}${tierTxt} → 코인 +${c}`);
          if(tier===2)pendingThrow=true; }
        if(k==="bill"){ let c=total; if(tier>=1)c+=5; S.coins+=c; log(`💵 지폐×${n}${tierTxt} → 코인 +${c}`);
          if(tier===2){S.shopFree=true; log("🏷️ 다음 상점 1회 무료!");} }
        if(k==="piggy"){ S.bank+=n;
          if(tier>=1){ const pay=S.bank*(tier===2?3:2); S.coins+=pay; log(`🐷 저금통 개봉! 코인 +${pay}`); S.bank=0; }
          else log(`🐷 저금통 적립 ${S.bank}`); }
        break; }
      case "luck": {
        if(k==="clover"){ let g=total; if(tier>=1)g+=3; if(tier===2)g+=2; S.gauge=Math.min(22,S.gauge+g); log(`🍀 클로버×${n}${tierTxt} → 게이지 +${g}`); }
        if(k==="dice"){
          if(tier===2){ dealDamage(3,false,"🎲"); S.block+=3; healP(3); log("🎲 각성 — 공·방·회 3씩!"); }
          else { const amt=2*n+(tier===1?2:0); const r=Math.floor(Math.random()*3);
            if(r===0)dealDamage(amt,false,`🎲주사위×${n}`); else if(r===1){S.block+=amt; log(`🎲 방어 +${amt}`);} else {healP(amt); log(`🎲 회복 +${amt}`);} } }
        if(k==="candy"){ healP(n); S.gauge=Math.min(22,S.gauge+n); let ex="";
          if(tier>=1){S.coins+=2; ex=" 코인+2";} if(tier===2){S.rerollTokens++; ex+=" 리롤+1";}
          log(`🍬 별사탕×${n} → 회복+게이지 +${n}${ex}`); }
        break; }
      case "ghost": {
        if(k==="note"){ let d=total; if(tier>=1){d+=4; S.eAtkDown+=1; log("📓 적 공격 -1");}
          if(tier===2&&!S.enemy.boss){S.eSeal=true; log("📓 봉인 — 적 다음 행동 취소!");}
          else if(tier===2){S.eSeal=true; log("📓 봉인!");}
          dealDamage(d+turnAtkBonus,false,`📓괴담노트×${n}${tierTxt}`); }
        if(k==="clock"){ const reN=(tier>=1?2:1);
          const top=[...pats].sort((a,b)=>b.mult-a.mult).slice(0,reN);
          for(const p of top){ const v=Math.round(p.cells.reduce((s,i)=>S.cells[i]&&KINDS[S.cells[i].k].cat===p.cat? s+KINDS[S.cells[i].k].pow*p.mult:s,0));
            if(v>0){ applyCatValue(p.cat,v); log(`⚙️ ${p.name} 재정산 → ${CATS[p.cat].name} +${v}`); } } }
        break; }
    }
    render();
    await sleep(360);
    if(S.eHp<=0) return;
  }
  if(overheal>0 && S.eHp>0){ dealDamage(overheal,false,"과회복 전환"); await sleep(250); }
  if(pendingThrow && S.eHp>0){ await askMoneyThrow(); }
}
function applyCatValue(cat,v){
  if(cat==="atk"||cat==="ghost") dealDamage(v,false,"재정산");
  else if(cat==="def") S.block+=v;
  else if(cat==="heal") healP(v);
  else if(cat==="psn") addPsn(v);
  else if(cat==="coin") S.coins+=v;
  else if(cat==="luck") S.gauge=Math.min(22,S.gauge+v);
}
function dealDamage(d, pierce, src){
  if(d<=0) return;
  let dmg=d;
  if(!pierce && S.eBlock>0){ const ab=Math.min(S.eBlock,dmg); S.eBlock-=ab; dmg-=ab; if(ab)log(`(보호막이 ${ab} 흡수)`); }
  S.eHp=Math.max(0,S.eHp-dmg);
  S.stats.dmg+=dmg; S.stats.best=Math.max(S.stats.best,dmg);
  if(dmg>0){ log(`<span class="dmg">▶ ${src} — ${dmg} 피해!</span>`); floatNum("#enemy", "-"+dmg, "#ff8a8a"); document.getElementById("enemy").classList.add("shake"); setTimeout(()=>document.getElementById("enemy").classList.remove("shake"),360); }
  render();
}
function healP(h){ if(h<=0)return; S.hp=Math.min(S.maxHp,S.hp+h); render(); }
function addPsn(p){ S.ePsn+=p; log(`☠️ 적 독 +${p} (현재 ${S.ePsn})`); }
function floatNum(sel, txt, color){
  const host=document.querySelector(sel); const el=document.createElement("div");
  el.className="floatdmg"; el.textContent=txt; el.style.color=color;
  el.style.left=(40+Math.random()*40)+"%"; el.style.top="10px"; host.appendChild(el);
  setTimeout(()=>el.remove(),900);
}

/* ============ 적 턴 ============ */
async function enemyTurn(){
  S.phase="busy"; render();
  await sleep(380);
  // 독 틱
  if(S.ePsn>0){ S.eHp=Math.max(0,S.eHp-S.ePsn); log(`☠️ 독 피해 ${S.ePsn}`); floatNum("#enemy","-"+S.ePsn,"#c084fc");
    if(!S.psnHold) S.ePsn=Math.max(0,S.ePsn-1); S.psnHold=false; render(); await sleep(380);
    if(S.eHp<=0){ await winBattle(); return; } }
  if(S.eSeal){ log("⛓️ 적의 행동이 봉인되었다!"); S.eSeal=false; }
  else if(S.eStun){ log("💫 적은 기절해서 움직이지 못한다!"); S.eStun=false; }
  else {
    const act=S.enemy.pat[S.eIdx % S.enemy.pat.length]; S.eIdx++;
    if(act.t==="atk"){
      let dmg=Math.max(0,act.v-S.eAtkDown);
      const blocked=Math.min(S.block,dmg); const thru=dmg-blocked; S.block-=blocked;
      if(thru>0){ S.hp=Math.max(0,S.hp-thru); floatNum("#board","-"+thru,"#ff8a8a"); }
      log(`👿 ${act.txt} → ${blocked?`방어 ${blocked} / `:""}피해 ${thru}`);
      if(S.reflect && blocked>0){ const rd=blocked*S.reflect; dealDamage(rd,true,"🦔 가시 반사");
        if(S.reflectPsn)addPsn(1); if(S.eHp<=0){ await winBattle(); return; } }
    } else if(act.t==="heal"){ S.eHp=Math.min(S.enemy.hp,S.eHp+act.v); log(`👿 ${act.txt}`); }
    else if(act.t==="block"){ S.eBlock+=act.v; log(`👿 ${act.txt}`); }
    else if(act.t==="curse"){ const ck=S.enemy.boss? ["curse","crack","fog","nightmare"][Math.floor(Math.random()*4)] : "curse";
      S.deck.push({k:ck}); log(`👿 ${act.txt} — 덱에 ${KINDS[ck].name}${ck==="curse"?"이":"가"} 들어왔다!`); }
    else if(act.t==="rule"){
      const roll=Math.random();
      if(roll<0.4){ const cats=["atk","def","heal","psn","coin","luck","ghost"];
        S.bossRule={kind:"ban", cat:cats[Math.floor(Math.random()*cats.length)]};
        log(`👿 괴담 규칙 — <span class="hl">"조용히 해!" 다음 턴 ${CATS[S.bossRule.cat].name} 계열 발동 금지</span>`); }
      else if(roll<0.7){ S.bossRule={kind:"noDiag"};
        log(`👿 괴담 규칙 — <span class="hl">"떨어져!" 다음 턴 대각 문양 금지</span>`); }
      else { S.bossRule={kind:"noMerge"};
        log(`👿 괴담 규칙 — <span class="hl">"흩어져!" 다음 턴 동종 합체 금지</span>`); }
      S.bossRuleUsed=false; }
  }
  S.reflect=0; S.reflectPsn=false;
  render();
  if(S.hp<=0){ gameOver(false); return; }
  await sleep(300);
  S.phase="spin";
  if(S.bossRuleUsed){ S.bossRule=null; S.bossRuleUsed=false; }
  else if(S.bossRule) S.bossRuleUsed=true;
  render();
}

/* ============ 전투 종료 / 진행 ============ */
async function winBattle(){
  S.phase="busy"; render();
  log(`<span class="good">✔ ${S.enemy.name} 처치!</span>`);
  await sleep(500);
  if(S.battle===ENEMIES.length-1){ gameOver(true); return; }
  S.coins+=10; log("전투 보상: 코인 +10");
  S.battle++;
  openShop();
}
function gameOver(win){
  S.phase="over";

  ovl(`<h2>${win?"🏆 거리 1 클리어!":"💀 조사 실패…"}</h2>

/* ============ 드래프트 / 상점 / 운명의 손 ============ */
function rollKind(){
  const ks=Object.keys(KINDS).filter(k=>KINDS[k].cat!=="curse");
  const tw=ks.reduce((s,k)=>s+CATS[KINDS[k].cat].w,0);
  let r=Math.random()*tw;
  for(const k of ks){ r-=CATS[KINDS[k].cat].w; if(r<=0) return k; }
  return ks[0];
}
function kindOptHtml(k, extra){
  const kd=KINDS[k], cat=CATS[kd.cat];
  return `<span class="em">${kd.em}</span><span><span class="tt"><span class="catdot" style="background:${cat.color}"></span>${kd.name} <small style="color:${cat.color}">${cat.name}</small></span><div class="dd">${kd.desc}</div></span>${extra||""}`;
}
function openDraft(){
  const nOpt = S.draft4?4:3; S.draft4=false;
  const opts=[...Array(nOpt)].map(()=>rollKind());

    html+=`<div class="opt" onclick="UI.pick(${i})" data-k="${k}">${kindOptHtml(k,rec)}</div>`; });
  html+=`<div class="rowbtns"><button onclick="UI.pick(-1)">스킵 (+1 코인)</button>${S.rerollTokens>0?`<button onclick="UI.rerollDraft()">🔄 리롤 (토큰 ${S.rerollTokens})</button>`:""}</div>`;
  S._draftOpts=opts; ovl(html);
}

/* ============ 렌더링 ============ */
function ovl(html){ document.getElementById("ovlBox").innerHTML=html; document.getElementById("ovl").classList.add("show"); }
function closeOvl(){ document.getElementById("ovl").classList.remove("show"); }
const LOGS=[];
function log(msg){ LOGS.push(msg); if(LOGS.length>5)LOGS.shift(); const el=document.getElementById("log"); if(el)el.innerHTML=LOGS.join("<br>"); }
function popCells(idx){ idx.forEach(i=>{ const el=document.querySelector(`[data-cell="${i}"]`); if(el){el.classList.add("pop"); setTimeout(()=>el.classList.remove("pop"),200);} }); }
function renderBoard(active,misfires,mult,pats){
  const b=document.getElementById("board"); b.innerHTML="";
  const patCells=new Set(); (pats||[]).forEach(p=>p.cells.forEach(i=>patCells.add(i)));
  for(let i=0;i<N;i++){
    const d=document.createElement("div"); d.className="cell"; d.dataset.cell=i;
    const s=S?S.cells[i]:null;
    if(s){ const kd=KINDS[s.k]; const cat=CATS[kd.cat]||{color:"#5a1f1f"};
      d.innerHTML=`${kd.em}<span class="nm">${kd.name}${s.sig?"★":""}</span>`;
      d.style.setProperty("--c",cat.color);
      if(s.k==="curse")d.classList.add("curse");
      if(S && S.bossRule && S.bossRule.kind==="ban" && kd.cat===S.bossRule.cat) d.classList.add("banned");
      if(active&&active.has(i))d.classList.add("active");
      if(active&&!active.has(i)&&s.k!=="curse")d.classList.add("misfire");
      if(patCells.has(i))d.classList.add("pattern");
    }
    b.appendChild(d);
  }
}
function render(){
  if(!S) return;
  document.getElementById("stageTxt").textContent=`거리 1 — ${S.battle===3?"👑 보스":"전투 "+(S.battle+1)+"/4"} · 턴 ${S.turn}`;
  document.getElementById("charName").textContent=S.char.name;
  document.getElementById("coinTxt").textContent=S.coins;
  document.getElementById("eName").textContent=S.enemy.name;
  const next=S.enemy.pat[S.eIdx % S.enemy.pat.length];
  document.getElementById("eIntent").textContent="다음 행동: "+(S.eSeal?"⛓️ 봉인됨":S.eStun?"💫 기절":next.txt);
  const tags=[]; if(S.ePsn)tags.push(`☠️독 ${S.ePsn}`); if(S.eBlock)tags.push(`🛡 보호막 ${S.eBlock}`); if(S.eAtkDown)tags.push(`⬇ 공격 -${S.eAtkDown}`);
  if(S.bossRule)tags.push(S.bossRule.kind==="ban"?`🚫 ${CATS[S.bossRule.cat].name} 발동 금지`:S.bossRule.kind==="noDiag"?"🚫 대각 문양 금지":"🚫 합체 금지");
  document.getElementById("eTags").textContent=tags.join(" · ");
  document.getElementById("eHp").style.width=(S.eHp/S.enemy.hp*100)+"%";
  document.getElementById("eHpT").textContent=`${S.eHp} / ${S.enemy.hp}`;
  document.getElementById("pHp").style.width=(S.hp/S.maxHp*100)+"%";
  document.getElementById("pHpT").textContent=`${S.hp} / ${S.maxHp}${S.block?` (🛡️${S.block})`:""}`;
  const bt=document.getElementById("blockTxt"); bt.style.display=S.block?"":"none"; bt.textContent="🛡️ "+S.block;
  document.getElementById("gaugeFill").style.width=(S.gauge/22*100)+"%";
  document.getElementById("gaugeText").textContent=`운명 게이지 ${S.gauge} / 22${S.fatePlan?` — ${S.fatePlan.tier.name} 예약됨!`:""}`;
  const sunny=S.char.id==="sunny";
  document.getElementById("fateBtn").disabled = S.phase!=="spin" || S.fatePlan!==null;
  const sb=document.getElementById("spinBtn");
  sb.disabled = S.phase!=="spin";
  sb.textContent = S.phase==="busy" ? "⏳ 정산 중…" : "🎰 스핀";
  if(!document.querySelector("#board .cell")) renderBoard(null,[],null,[]);
}
document.getElementById("spinBtn").onclick=()=>doSpin();
document.getElementById("fateBtn").onclick=()=>{ if(S.phase==="spin"&&!S.fatePlan) fateMenu(); };
document.getElementById("helpBtn").onclick=()=>{ if(S&&S.phase==="spin") openHelp(); };
document.getElementById("deckBtn").onclick=()=>{ if(S&&S.phase==="spin") openDeck(); };
document.getElementById("pinBtn").onclick=()=>{ if(S&&S.phase==="spin") openPin(); };
document.getElementById("charBtn").onclick=()=>{ if(S&&(S.phase==="spin")) ovl(`<h2>👤 ${S.char.name} (${S.char.team}팀)</h2><div class="sub2">${S.char.trait}<br>시그니처: ${S.char.sigName}</div><div class="rowbtns"><button class="primary" onclick="UI.close()">닫기</button></div>`); };
/* 시작 */
renderBoard(null,[],null,[]);
openCharSelect();
if(typeof window!=="undefined"){ window.__hook={ get S(){return S;}, doSpin, enemyTurn, openShop, openDraft, fateMenu }; }
</script>
